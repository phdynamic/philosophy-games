<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Anvil — Philosophy Games</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5e4c0;
  --amber: #3d2005;
  --dim: #6b4820;
  --bright: #1a0a00;
  --font: 'Courier New', Courier, monospace;
}

html {
  overflow-y: scroll;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--amber);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

#app {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--dim);
  font-size: 12px;
}

#header a {
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#header a:hover { color: var(--amber); }

#header .game-label {
  color: var(--bright);
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-size: 13px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.9s ease-out both; }

/* Title screen */
#title-screen {
  padding: 80px 0 60px;
  text-align: center;
}

#title-screen h1 {
  font-size: 24px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 12px;
}

.title-subtitle {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 40px;
}

.title-portrait {
  width: 220px;
  max-width: 60%;
  display: block;
  margin: 0 auto 32px;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}

.title-portrait-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 40px;
}

.epigraph {
  color: var(--dim);
  font-size: 13px;
  font-style: italic;
  max-width: 460px;
  margin: 0 auto 10px;
  line-height: 1.8;
}

.epigraph-attr {
  color: var(--dim);
  font-size: 12px;
  margin-bottom: 56px;
}

.btn {
  display: inline-block;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 32px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn:hover { border-color: var(--bright); color: var(--bright); }

.btn-secondary {
  border-color: transparent;
  color: var(--dim);
  font-size: 13px;
  letter-spacing: 2px;
  padding: 8px 0;
}
.btn-secondary:hover { border-color: transparent; color: var(--amber); }

/* Scene */
.scene { padding-top: 40px; }

.scene-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
}

.scene-num {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
}

.scene-title {
  font-size: 17px;
  font-weight: bold;
  letter-spacing: 2px;
  color: var(--bright);
  text-transform: uppercase;
}

/* Painting */
.painting {
  width: 100%;
  display: block;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}

.attribution {
  font-size: 13px;
  color: var(--dim);
  font-style: italic;
  margin: 8px 0 32px;
}

/* Left panel (wide screens) */
#left-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: calc(50vw - 340px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
  pointer-events: none;
  overflow: hidden;
}

#left-panel img {
  max-width: 100%;
  max-height: 62vh;
  object-fit: contain;
  display: block;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}

#left-panel .left-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  text-align: center;
  margin-top: 10px;
  line-height: 1.5;
}

@media (max-width: 879px) {
  #left-panel { display: none; }
  .inline-painting, .inline-attribution { display: block !important; }
}

@media (min-width: 880px) {
  .inline-painting, .inline-attribution { display: none; }
}

/* Concept tiles */
.workspace {
  margin: 24px 0;
}

.workspace-label {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 14px;
}

.tiles {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
}

.tile {
  border: 1px solid var(--dim);
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  background: var(--bg);
  transition: border-color 0.2s, color 0.2s, transform 0.15s, box-shadow 0.15s;
  min-width: 140px;
  position: relative;
  overflow: hidden;
}

.tile:hover {
  border-color: var(--amber);
}

.tile.selected {
  border-color: var(--bright);
  transform: translateY(-2px);
  box-shadow: 0 3px 8px rgba(26, 10, 0, 0.12);
}

.tile.synthesized {
  border-color: var(--bright);
  cursor: default;
}

.tile.synthesized .tile-name {
  color: var(--bright);
  font-weight: bold;
}

.tile-name {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 4px;
  font-weight: bold;
}

.tile-desc {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.5;
}

@keyframes tileShake {
  0%, 100% { transform: translateX(0); }
  20%      { transform: translateX(-3px); }
  40%      { transform: translateX(3px); }
  60%      { transform: translateX(-3px); }
  80%      { transform: translateX(3px); }
}

.tile.shake {
  animation: tileShake 0.3s ease-out;
}

@keyframes tileFadeOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.9); }
}

.tile.merging {
  animation: tileFadeOut 0.4s ease-out forwards;
  pointer-events: none;
}

@keyframes tileAppear {
  from { opacity: 0; transform: scale(0.85) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.tile.appearing {
  animation: tileAppear 0.6s ease-out both;
}

/* Synthesize button */
.synth-area {
  margin: 8px 0 0;
  min-height: 48px;
}

/* Hegel commentary */
.hegel-wrap {
  margin: 28px 0 0;
  padding-left: 20px;
  border-left: 2px solid var(--dim);
  animation: hegelFadeIn 1.2s ease-out both;
}

@keyframes hegelFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.hegel-line {
  font-size: 13px;
  font-style: italic;
  color: var(--dim);
  line-height: 1.8;
  margin-bottom: 10px;
}
.hegel-line:last-child { margin-bottom: 0; }

.hegel-source {
  font-size: 12px;
  color: var(--dim);
  margin-top: 12px;
  letter-spacing: 1px;
}

.hegel-teaching {
  font-size: 14px;
  color: var(--amber);
  line-height: 1.7;
  margin-top: 20px;
  font-style: normal;
}

/* Chain (progress) */
.chain {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid rgba(154, 120, 72, 0.28);
}

.chain-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 12px;
}

.chain-entry {
  font-size: 13px;
  color: var(--dim);
  margin-bottom: 6px;
  animation: fadeUp 0.6s ease-out both;
}

.chain-entry .chain-result {
  color: var(--bright);
  font-weight: bold;
}

/* Instructions screen */
#instructions-screen {
  padding: 60px 0 40px;
}

#instructions-screen h2 {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  margin-bottom: 32px;
}

#instructions-screen p {
  color: var(--amber);
  margin-bottom: 14px;
  max-width: 560px;
}

#instructions-screen p.dim {
  color: var(--dim);
  font-size: 13px;
}

/* Demo tiles */
.demo-tiles {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin: 48px 0;
  flex-wrap: wrap;
}

.demo-tile {
  border: 1px solid var(--dim);
  padding: 12px 18px;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--amber);
}

.demo-arrow {
  font-size: 18px;
  color: var(--dim);
}

.demo-result {
  border: 1px solid var(--bright);
  padding: 12px 18px;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
}

/* Ending */
.ending-text p { margin-bottom: 14px; color: var(--amber); }

.ending-close {
  margin-top: 56px;
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}
</style>
</head>
<body>

<div id="left-panel"></div>
<div id="app">
  <div id="header">
    <a href="../index.html">&#x2190; Philosophy Games</a>
    <span class="game-label">The Anvil</span>
  </div>
  <div id="content"></div>
</div>

<script>
// ─── Image URLs (Wikimedia Commons, public domain) ─────────────────────────

const IMAGES = {
  hegel:   { src: 'https://commons.wikimedia.org/wiki/Special:FilePath/1831_Schlesinger_Philosoph_Georg_Friedrich_Wilhelm_Hegel_anagoria.JPG?width=900', alt: 'Portrait of Georg Wilhelm Friedrich Hegel', attr: 'Jakob Schlesinger, <em>Portrait of Hegel</em>, 1831. Alte Nationalgalerie, Berlin.' },
  monk:    { src: 'https://commons.wikimedia.org/wiki/Special:FilePath/Caspar_David_Friedrich_-_Der_M%C3%B6nch_am_Meer_-_Google_Art_Project.jpg?width=900', alt: 'A solitary figure before a vast empty sea and sky', attr: 'Caspar David Friedrich, <em>The Monk by the Sea</em>, 1808&#8211;10. Alte Nationalgalerie, Berlin.' },
  light:   { src: 'https://commons.wikimedia.org/wiki/Special:FilePath/William_Turner%2C_Light_and_Colour_%28Goethe%27s_Theory%29.JPG?width=900', alt: 'A vortex of golden light and colour swirling above indistinct forms', attr: 'J.M.W. Turner, <em>Light and Colour (Goethe&#8217;s Theory)</em>, 1843. Tate Britain, London.' },
  pollice: { src: 'https://commons.wikimedia.org/wiki/Special:FilePath/Jean-Leon_Gerome_Pollice_Verso.jpg?width=900', alt: 'A gladiator standing over a fallen opponent in a Roman arena', attr: 'Jean-L&#233;on G&#233;r&#244;me, <em>Pollice Verso</em>, 1872. Phoenix Art Museum.' },
  liberty: { src: 'https://commons.wikimedia.org/wiki/Special:FilePath/Eug%C3%A8ne_Delacroix_-_Le_28_Juillet._La_Libert%C3%A9_guidant_le_peuple.jpg?width=900', alt: 'Liberty personified leading the people forward over a barricade', attr: 'Eug&#232;ne Delacroix, <em>Liberty Leading the People</em>, 1830. Mus&#233;e du Louvre, Paris.' },
  athens:  { src: 'https://commons.wikimedia.org/wiki/Special:FilePath/Raphael_School_of_Athens.jpg?width=900', alt: 'Philosophers gathered in a grand classical hall', attr: 'Raphael, <em>The School of Athens</em>, 1509&#8211;11. Apostolic Palace, Vatican City.' }
};

// ─── Concepts ──────────────────────────────────────────────────────────────

const CONCEPTS = {
  being:        { name: 'Being',              desc: 'Pure indeterminate immediacy' },
  nothing:      { name: 'Nothing',            desc: 'The complete absence of determination' },
  becoming:     { name: 'Becoming',           desc: 'The passage of Being into Nothing and Nothing into Being' },
  quality:      { name: 'Quality',            desc: 'The determinateness that makes a thing what it is' },
  quantity:     { name: 'Quantity',           desc: 'Magnitude indifferent to the nature of a thing' },
  measure:      { name: 'Measure',            desc: 'The qualitative quantum &#8212; quantity with a threshold' },
  lordship:     { name: 'Lordship',           desc: 'Self-consciousness through domination of another' },
  bondage:      { name: 'Bondage',            desc: 'Self-consciousness subordinated to another will' },
  recognition:  { name: 'Mutual Recognition', desc: 'Each self confirmed by the freedom of the other' },
  right:        { name: 'Abstract Right',     desc: 'Freedom as property, contract, external structure' },
  morality:     { name: 'Morality',           desc: 'Freedom as conscience, intention, inner conviction' },
  ethical_life: { name: 'Ethical Life',       desc: 'Freedom actualized in family, society, and state' },
  nature:       { name: 'Nature',             desc: 'The Idea in its external, self-alienated form' },
  spirit:       { name: 'Spirit',             desc: 'A community that knows itself through its members' },
  absolute:     { name: 'Absolute Knowing',   desc: 'Spirit comprehending itself as the whole process' },
  existence:    { name: 'Existence',          desc: 'Determinate being &#8212; Being with a specific character' },
  finitude:     { name: 'Finitude',           desc: 'The limit inherent in every determinate thing' },
  infinity:     { name: 'Infinity',           desc: 'The self-relating negation of the finite' },
  limit:        { name: 'Limit',              desc: 'The boundary where a thing ceases to be itself' },
  desire:       { name: 'Desire',             desc: 'Self-consciousness seeking itself in the consumption of objects' },
  stoicism:     { name: 'Stoicism',           desc: 'Freedom attained through withdrawal into pure thought' },
  conscience:   { name: 'Conscience',         desc: 'The inner voice that judges right from wrong' },
  property:     { name: 'Property',           desc: 'The external embodiment of a person&#8217;s will' }
};

// ─── Syntheses ─────────────────────────────────────────────────────────────

const SYNTHESES = {
  'being+nothing': {
    result: 'becoming',
    quote: 'Pure Being and pure Nothing are the same. What is the truth is neither Being nor Nothing, but that Being &#8212; does not pass over but has passed over &#8212; into Nothing, and Nothing into Being. Their truth is this movement of the immediate vanishing of the one into the other: <em>Becoming</em>.',
    source: 'Science of Logic, 1812',
    teaching: 'This is the first moment of dialectics. Hegel begins the entire Science of Logic with the most abstract thought possible &#8212; pure Being, without any quality or determination. But to think Being with no qualities is indistinguishable from thinking Nothing. The two are identical in their emptiness, and their restless identity is Becoming: the passage from one to the other.'
  },
  'quality+quantity': {
    result: 'measure',
    quote: 'Measure is the qualitative quantum, the quantum as the existence of a quality. A thing that exceeds or falls short of its measure ceases to be what it is.',
    source: 'Science of Logic, 1812',
    teaching: 'Quality is what makes a thing <em>this</em> thing and not another. Quantity is its magnitude, apparently indifferent to its nature. But they are not truly independent: heat a thing enough and it changes what it is. Water at 100 degrees becomes steam. Measure is the insight that quantity always has a qualitative threshold &#8212; that &#8220;how much&#8221; secretly determines &#8220;what kind.&#8221;'
  },
  'bondage+lordship': {
    result: 'recognition',
    quote: 'Self-consciousness exists in and for itself when, and by the fact that, it so exists for another; that is, it exists only in being acknowledged.',
    source: 'Phenomenology of Spirit, 1807',
    teaching: 'The famous master-slave dialectic. The lord who dominates another consciousness finds his recognition hollow: it comes from someone he has reduced to a thing. The bondsman, forced to work and reshape the world, discovers in labour a self that the lord never achieves. Neither position is stable alone. True self-consciousness requires <em>mutual</em> recognition &#8212; each self confirmed by a free other.'
  },
  'morality+right': {
    result: 'ethical_life',
    quote: 'The right of individuals to their subjective determination to freedom is fulfilled when they belong to an ethical actuality; for their certainty of their freedom has its truth in such objectivity.',
    source: 'Philosophy of Right, 1820',
    teaching: 'Abstract Right gives us property and contract &#8212; the external shell of freedom. Morality gives us conscience and intention &#8212; the internal dimension. But a right without inner commitment is empty law, and a morality without institutions is impotent good will. Ethical Life (<em>Sittlichkeit</em>) &#8212; the family, civil society, the state &#8212; is where freedom becomes actual: subjective conviction and objective structure united.'
  },
  'becoming+measure': {
    result: 'nature',
    quote: 'Nature is to be regarded as a system of stages, one arising necessarily from the other.',
    source: 'Philosophy of Nature, 1830',
    teaching: 'Logic made concrete. Becoming is the abstract principle of passage; Measure is its determination. Together they give us Nature &#8212; the realm where the Idea exists outside itself, governed by measure and transformation. Every natural process is a becoming bounded by measure: seeds grow into trees, not infinitely, but to the limit of their kind.'
  },
  'ethical_life+recognition': {
    result: 'spirit',
    quote: 'Spirit is the ethical life of a nation in so far as it is the immediate truth &#8212; the individual that is a world.',
    source: 'Phenomenology of Spirit, 1807',
    teaching: 'Spirit (<em>Geist</em>) is not a ghost. It is the life of a community that knows itself through its members, and whose members know themselves through it. Mutual recognition gives us the interpersonal foundation; Ethical Life gives us the institutional form. Spirit is their unity &#8212; a shared rational life that is both deeply personal and fully objective.'
  },
  'nature+spirit': {
    result: 'absolute',
    quote: 'The goal, Absolute Knowing, or Spirit that knows itself as Spirit, has for its path the recollection of the Spirits as they are in themselves and as they accomplish the organization of their realm.',
    source: 'Phenomenology of Spirit, 1807',
    teaching: 'Absolute Knowing is not omniscience. It is the recognition that subject and object, thought and reality, are not two separate things accidentally meeting, but one process comprehending itself. Nature is the Idea outside itself; Spirit is the Idea returned to itself. Their unity is the Absolute &#8212; not found at the end, but revealed as having been the whole path all along.'
  }
};

// ─── Stages ────────────────────────────────────────────────────────────────

const STAGES = [
  {
    num: 'I',
    title: 'Being',
    img: 'monk',
    startConcepts: ['being', 'nothing', 'existence', 'finitude'],
    target: 'becoming',
    intro: 'Hegel begins with the most abstract thought possible. Think pure Being &#8212; with no qualities, no determination, no content. Which of these concepts truly oppose each other at the deepest level?'
  },
  {
    num: 'II',
    title: 'Quality',
    img: 'light',
    startConcepts: ['quality', 'quantity', 'infinity', 'limit'],
    target: 'measure',
    intro: 'A thing has properties that define it and magnitudes that seem indifferent to its nature. Which pair conceals a hidden unity?'
  },
  {
    num: 'III',
    title: 'Self-Consciousness',
    img: 'pollice',
    startConcepts: ['lordship', 'bondage', 'desire', 'stoicism'],
    target: 'recognition',
    intro: 'Self-consciousness encounters another self-consciousness. Desire, dominance, submission, withdrawal &#8212; all are strategies. Which pair forms the dialectic that resolves into something higher?'
  },
  {
    num: 'IV',
    title: 'Right and Morality',
    img: 'liberty',
    startConcepts: ['right', 'morality', 'conscience', 'property'],
    target: 'ethical_life',
    intro: 'Freedom takes many forms &#8212; law, conscience, ownership, moral conviction. But only one pair represents the fundamental opposition whose resolution is Ethical Life.'
  },
  {
    num: 'V',
    title: 'The Absolute',
    img: 'athens',
    startConcepts: ['becoming', 'measure', 'recognition', 'ethical_life'],
    target: 'absolute',
    intro: 'Everything you have forged returns. The products of earlier stages become raw material for the final movement. This is <em>Aufhebung</em> &#8212; each moment preserved, transcended, and lifted into something higher.'
  }
];

// ─── Rejection lines ───────────────────────────────────────────────────────

const REJECTIONS = [
  'Not every opposition conceals a unity. These terms do not yet speak to each other.',
  'The dialectic is patient. These concepts are not ready to be reconciled.',
  'A premature synthesis is worse than none at all. Consider what each concept truly lacks.',
  'These resist combination &#8212; not because contradiction is absent, but because it is not the right contradiction.',
  'Spirit does not force connections. It finds them. Try again.'
];

// ─── State ─────────────────────────────────────────────────────────────────

const state = {
  screen: 'title',
  stageIndex: 0,
  available: [],
  selected: [],
  chainEntries: [],
  animating: false,
  rejectionIndex: 0
};

const content = document.getElementById('content');
const leftPanel = document.getElementById('left-panel');

// ─── Utility ───────────────────────────────────────────────────────────────

function div(cls, html) {
  const el = document.createElement('div');
  if (cls) el.className = cls;
  el.innerHTML = html;
  return el;
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function makeKey(a, b) {
  return [a, b].sort().join('+');
}

function imgTag(src, alt, extraClass) {
  const cls = extraClass ? 'painting ' + extraClass : 'painting';
  return '<img class="' + cls + '" src="' + src + '" alt="' + alt + '" onerror="this.style.display=\'none\'" loading="lazy">';
}

function setLeftPanel(imgKey) {
  if (!imgKey || !IMAGES[imgKey]) {
    leftPanel.innerHTML = '';
    leftPanel.style.opacity = '0';
    return;
  }
  const img = IMAGES[imgKey];
  leftPanel.innerHTML = '<img src="' + img.src + '" alt="' + img.alt + '" onerror="this.style.display=\'none\'" loading="lazy"><p class="left-attr">' + img.attr + '</p>';
  leftPanel.style.opacity = '1';
}

// ─── Render: Title ─────────────────────────────────────────────────────────

function renderTitle() {
  scrollTop();
  setLeftPanel();
  content.innerHTML = '';
  const hegel = IMAGES.hegel;
  const el = div('fade-in', '\
    <div id="title-screen">\
      <h1>The Anvil</h1>\
      <div class="title-subtitle">a game of dialectics</div>\
      <img class="title-portrait" src="' + hegel.src + '" alt="' + hegel.alt + '" onerror="this.style.display=\'none\'" loading="lazy">\
      <p class="title-portrait-attr">' + hegel.attr + '</p>\
      <p class="epigraph">&#8220;The bud disappears when the blossom breaks through, and we might say that the former is refuted by the latter; in the same way when the fruit comes, the blossom may be explained to be a false form of the plant&#8217;s existence, for the fruit appears as its true nature in place of the blossom.&#8221;</p>\
      <p class="epigraph-attr">&#8212; Hegel, <em>Phenomenology of Spirit</em>, 1807</p>\
      <button class="btn" id="begin-btn">Begin</button>\
    </div>\
  ');
  content.appendChild(el);
  el.querySelector('#begin-btn').addEventListener('click', function() {
    state.screen = 'instructions';
    render();
  });
}

// ─── Render: Instructions ──────────────────────────────────────────────────

function renderInstructions() {
  scrollTop();
  setLeftPanel();
  content.innerHTML = '';
  const el = div('fade-in', '\
    <div id="instructions-screen">\
      <h2>How This Works</h2>\
      <p>Hegel believed that ideas develop through contradiction. Every concept, held firmly enough, reveals its opposite. And every opposition, understood deeply enough, resolves into something higher.</p>\
      <p>You will be given opposing concepts. Your task is to find which pairs belong together &#8212; and to forge their synthesis.</p>\
      <p>Click two concept tiles to select them. If they form a genuine dialectical pair, they will merge into a new, higher concept. If not, they will resist.</p>\
      <div class="demo-tiles">\
        <span class="demo-tile">Thesis</span>\
        <span class="demo-arrow">+</span>\
        <span class="demo-tile">Antithesis</span>\
        <span class="demo-arrow">&#8594;</span>\
        <span class="demo-result">Synthesis</span>\
      </div>\
      <p>This is not guessing. It is thinking. Read the descriptions. Consider what each concept lacks. The synthesis is always the concept that preserves both sides while transcending their opposition.</p>\
      <p class="dim">There are five stages. The final stage uses what you have already forged.</p>\
      <div style="margin-top: 40px;">\
        <button class="btn" id="start-btn">Begin</button>\
      </div>\
    </div>\
  ');
  content.appendChild(el);
  el.querySelector('#start-btn').addEventListener('click', function() {
    state.screen = 'game';
    state.stageIndex = 0;
    state.available = STAGES[0].startConcepts.slice();
    state.selected = [];
    state.chainEntries = [];
    render();
  });
}

// ─── Render: Game ──────────────────────────────────────────────────────────

function renderGame() {
  scrollTop();
  const stage = STAGES[state.stageIndex];
  const img = IMAGES[stage.img];
  setLeftPanel(stage.img);
  content.innerHTML = '';

  var tilesHtml = '';
  for (var i = 0; i < state.available.length; i++) {
    var cid = state.available[i];
    var c = CONCEPTS[cid];
    var isSel = state.selected.indexOf(cid) !== -1;
    var isSynth = state.startConcepts && stage.startConcepts.indexOf(cid) === -1;
    var cls = 'tile';
    if (isSel) cls += ' selected';
    tilesHtml += '<div class="tile' + (isSel ? ' selected' : '') + '" data-id="' + cid + '">\
      <div class="tile-name">' + c.name + '</div>\
      <div class="tile-desc">' + c.desc + '</div>\
    </div>';
  }

  var chainHtml = '';
  if (state.chainEntries.length > 0) {
    chainHtml = '<div class="chain"><div class="chain-label">The Chain of Spirit</div>';
    for (var j = 0; j < state.chainEntries.length; j++) {
      var entry = state.chainEntries[j];
      chainHtml += '<div class="chain-entry">' + entry + '</div>';
    }
    chainHtml += '</div>';
  }

  var el = div('scene fade-in', '\
    <div class="scene-header">\
      <span class="scene-num">' + stage.num + '</span>\
      <span class="scene-title">' + stage.title + '</span>\
    </div>\
    ' + imgTag(img.src, img.alt, 'inline-painting') + '\
    <p class="attribution inline-attribution">' + img.attr + '</p>\
    <div class="scene-text"><p>' + stage.intro + '</p></div>\
    <p class="workspace-label">Concepts <span style="font-size:12px;letter-spacing:1px;text-transform:none;color:var(--dim);opacity:0.7;">&#8212; select two to synthesize</span></p>\
    <div class="tiles" id="tile-container">' + tilesHtml + '</div>\
    <div class="synth-area" id="synth-area"></div>\
    <div id="commentary-area"></div>\
    ' + chainHtml + '\
  ');

  content.appendChild(el);
  attachTileListeners();
}

function attachTileListeners() {
  var tiles = document.querySelectorAll('#tile-container .tile');
  tiles.forEach(function(t) {
    t.addEventListener('click', function() {
      if (state.animating) return;
      var id = t.dataset.id;
      handleTileClick(id);
    });
  });
}

function handleTileClick(id) {
  var idx = state.selected.indexOf(id);
  if (idx !== -1) {
    state.selected.splice(idx, 1);
  } else {
    if (state.selected.length >= 2) {
      state.selected = [id];
    } else {
      state.selected.push(id);
    }
  }

  // Update visual selection
  var tiles = document.querySelectorAll('#tile-container .tile');
  tiles.forEach(function(t) {
    if (state.selected.indexOf(t.dataset.id) !== -1) {
      t.classList.add('selected');
    } else {
      t.classList.remove('selected');
    }
  });

  // Show/hide synthesize button
  var synthArea = document.getElementById('synth-area');
  if (state.selected.length === 2) {
    synthArea.innerHTML = '<button class="btn" id="synth-btn">Synthesize</button>';
    synthArea.querySelector('#synth-btn').addEventListener('click', function() {
      attemptSynthesis(state.selected[0], state.selected[1]);
    });
  } else {
    synthArea.innerHTML = '';
  }
}

function attemptSynthesis(a, b) {
  var key = makeKey(a, b);
  var synth = SYNTHESES[key];

  if (!synth) {
    rejectSynthesis(a, b);
    return;
  }

  state.animating = true;

  // Animate merging tiles
  var tiles = document.querySelectorAll('#tile-container .tile');
  tiles.forEach(function(t) {
    if (t.dataset.id === a || t.dataset.id === b) {
      t.classList.add('merging');
    }
  });

  // Hide synth button
  document.getElementById('synth-area').innerHTML = '';

  setTimeout(function() {
    // Remove consumed concepts, add result
    state.available = state.available.filter(function(c) { return c !== a && c !== b; });
    state.available.push(synth.result);

    // If target reached, clear leftover decoys so only the result remains
    var stage = STAGES[state.stageIndex];
    if (synth.result === stage.target) {
      state.available = [synth.result];
    }
    state.selected = [];

    // Add chain entry
    var nameA = CONCEPTS[a].name;
    var nameB = CONCEPTS[b].name;
    var nameR = CONCEPTS[synth.result].name;
    state.chainEntries.push(nameA + ' + ' + nameB + ' = <span class="chain-result">' + nameR + '</span>');

    // Re-render tiles
    var container = document.getElementById('tile-container');
    var tilesHtml = '';
    for (var i = 0; i < state.available.length; i++) {
      var cid = state.available[i];
      var c = CONCEPTS[cid];
      var isNew = cid === synth.result;
      tilesHtml += '<div class="tile' + (isNew ? ' appearing' : '') + '" data-id="' + cid + '">\
        <div class="tile-name">' + c.name + '</div>\
        <div class="tile-desc">' + c.desc + '</div>\
      </div>';
    }
    container.innerHTML = tilesHtml;
    attachTileListeners();

    // Update chain
    var chainArea = document.querySelector('.chain');
    if (!chainArea) {
      var chainDiv = div('chain', '<div class="chain-label">The Chain of Spirit</div>');
      document.getElementById('commentary-area').after(chainDiv);
      chainArea = chainDiv;
    }
    // Re-render chain entries
    var chainContent = '<div class="chain-label">The Chain of Spirit</div>';
    for (var j = 0; j < state.chainEntries.length; j++) {
      chainContent += '<div class="chain-entry">' + state.chainEntries[j] + '</div>';
    }
    chainArea.innerHTML = chainContent;

    // Show Hegel commentary
    showCommentary(synth);

    state.animating = false;
  }, 450);
}

function rejectSynthesis(a, b) {
  state.animating = true;
  var tiles = document.querySelectorAll('#tile-container .tile');
  tiles.forEach(function(t) {
    if (t.dataset.id === a || t.dataset.id === b) {
      t.classList.add('shake');
    }
  });

  // Show rejection message
  var commentaryArea = document.getElementById('commentary-area');
  var rejection = REJECTIONS[state.rejectionIndex % REJECTIONS.length];
  state.rejectionIndex++;
  commentaryArea.innerHTML = '<div class="hegel-wrap"><p class="hegel-line">' + rejection + '</p></div>';

  state.selected = [];
  document.getElementById('synth-area').innerHTML = '';

  // Remove selection visuals
  tiles.forEach(function(t) {
    t.classList.remove('selected');
  });

  setTimeout(function() {
    tiles.forEach(function(t) {
      t.classList.remove('shake');
    });
    state.animating = false;
  }, 350);
}

function showCommentary(synth) {
  var commentaryArea = document.getElementById('commentary-area');
  var stage = STAGES[state.stageIndex];
  var isTarget = synth.result === stage.target;

  var html = '<div class="hegel-wrap">\
    <p class="hegel-line">&#8220;' + synth.quote + '&#8221;</p>\
    <p class="hegel-source">&#8212; ' + synth.source + '</p>\
    <p class="hegel-teaching">' + synth.teaching + '</p>';

  if (isTarget && state.stageIndex < STAGES.length - 1) {
    html += '<div style="margin-top:32px;"><button class="btn" id="next-stage-btn">Continue</button></div>';
  } else if (isTarget && state.stageIndex === STAGES.length - 1) {
    html += '<div style="margin-top:32px;"><button class="btn" id="ending-btn">Continue</button></div>';
  }

  html += '</div>';
  commentaryArea.innerHTML = html;

  if (isTarget && state.stageIndex < STAGES.length - 1) {
    document.getElementById('next-stage-btn').addEventListener('click', function() {
      state.stageIndex++;
      var nextStage = STAGES[state.stageIndex];
      state.available = nextStage.startConcepts.slice();
      state.selected = [];
      state.screen = 'game';
      render();
    });
  } else if (isTarget && state.stageIndex === STAGES.length - 1) {
    document.getElementById('ending-btn').addEventListener('click', function() {
      state.screen = 'ending';
      render();
    });
  }
}

// ─── Render: Ending ────────────────────────────────────────────────────────

function renderEnding() {
  scrollTop();
  setLeftPanel('athens');
  content.innerHTML = '';
  var el = div('scene fade-in', '\
    <div class="scene-header">\
      <span class="scene-num">VI</span>\
      <span class="scene-title">The Whole Path</span>\
    </div>\
    ' + imgTag(IMAGES.athens.src, IMAGES.athens.alt, 'inline-painting') + '\
    <p class="attribution inline-attribution">' + IMAGES.athens.attr + '</p>\
    <div class="ending-text">\
      <p>You have followed the path of Spirit from its most abstract beginning &#8212; pure Being, indistinguishable from Nothing &#8212; to its self-comprehension in Absolute Knowing.</p>\
      <p>Hegel published the <em>Phenomenology of Spirit</em> in 1807, finishing the manuscript the night before Napoleon&#8217;s troops entered Jena. He called it a &#8220;voyage of discovery.&#8221; The system he built from it occupied the rest of his life.</p>\
      <p>His method &#8212; thesis, antithesis, synthesis, though he never used those words &#8212; remains one of the most influential frameworks in the history of thought. Marx inverted it. Kierkegaard revolted against it. Every generation since has had to reckon with it.</p>\
    </div>\
    <div class="hegel-wrap" style="margin-top:36px;">\
      <p class="hegel-line">Every contradiction you forged through was a necessary moment. The Absolute is not found at the end &#8212; it is the whole path.</p>\
      <p class="hegel-line">The method was the message.</p>\
    </div>\
    <div class="chain" style="margin-top:40px;">\
      <div class="chain-label">The Chain of Spirit</div>\
      ' + state.chainEntries.map(function(e) { return '<div class="chain-entry">' + e + '</div>'; }).join('') + '\
    </div>\
    <div class="ending-close">\
      <button class="btn" id="home-btn">Return to Philosophy Games</button>\
      <button class="btn btn-secondary" id="restart-btn">Start Over</button>\
    </div>\
  ');
  content.appendChild(el);
  el.querySelector('#home-btn').addEventListener('click', function() {
    window.location.href = '../index.html';
  });
  el.querySelector('#restart-btn').addEventListener('click', function() {
    state.screen = 'title';
    state.stageIndex = 0;
    state.available = [];
    state.selected = [];
    state.chainEntries = [];
    state.rejectionIndex = 0;
    render();
  });
}

// ─── Router ────────────────────────────────────────────────────────────────

function render() {
  if      (state.screen === 'title')        renderTitle();
  else if (state.screen === 'instructions') renderInstructions();
  else if (state.screen === 'game')         renderGame();
  else if (state.screen === 'ending')       renderEnding();
}

render();
</script>
</body>
</html>
