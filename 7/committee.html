<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Committee — Philosophy Games</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5e4c0;
  --amber: #3d2005;
  --dim: #6b4820;
  --bright: #1a0a00;
  --approve: #2d4a1e;
  --reject: #6b1a1a;
  --flag: #5a4416;
  --font: 'Courier New', Courier, monospace;
}

html { overflow-y: scroll; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--amber);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

#app { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--dim);
  font-size: 12px;
}
#header a {
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#header a:hover { color: var(--amber); }
#header .game-label {
  color: var(--bright);
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 12px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.9s ease-out both; }

/* Title screen */
#title-screen { padding: 60px 0 40px; text-align: center; }
#title-screen h1 {
  font-size: 22px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 12px;
}
.title-subtitle {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 40px;
}
.title-portrait {
  width: 220px;
  max-width: 60%;
  display: block;
  margin: 0 auto 32px;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}
.title-portrait-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 40px;
}
.epigraph {
  color: var(--dim);
  font-size: 13px;
  font-style: italic;
  max-width: 500px;
  margin: 0 auto 10px;
  line-height: 1.8;
}
.epigraph-attr {
  color: var(--dim);
  font-size: 12px;
  margin-bottom: 56px;
}

.btn {
  display: inline-block;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 32px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn:hover { border-color: var(--bright); color: var(--bright); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  border-color: transparent;
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 2px;
  padding: 8px 0;
}
.btn-secondary:hover { border-color: transparent; color: var(--amber); }

/* Memorandum formatting */
.memo {
  border: 1px solid var(--dim);
  padding: 28px 32px;
  margin: 28px 0;
  background: rgba(255, 248, 220, 0.4);
  position: relative;
}
.memo-header {
  border-bottom: 1px solid var(--dim);
  padding-bottom: 12px;
  margin-bottom: 16px;
}
.memo-title {
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 10px;
}
.memo-field {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 2px;
}
.memo-field strong {
  display: inline-block;
  width: 48px;
  color: var(--amber);
  letter-spacing: 1px;
}
.memo-body {
  font-size: 14px;
  line-height: 1.75;
  color: var(--amber);
}
.memo-body p { margin-bottom: 12px; }
.memo-body p:last-child { margin-bottom: 0; }

.memo-empty {
  border: 1px dashed var(--dim);
  padding: 40px 32px;
  margin: 28px 0;
  text-align: center;
  background: transparent;
}
.memo-empty p {
  font-size: 13px;
  color: var(--dim);
  font-style: italic;
}

/* Round header */
.round-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin: 36px 0 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--dim);
}
.dept-name {
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bright);
}
.round-label {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
}
.dept-subtitle {
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 12px;
}

/* Proposal cards */
.proposals-area { margin: 24px 0; }
.proposals-label {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 14px;
}
.proposal {
  border: 1px solid var(--dim);
  padding: 18px 20px;
  margin-bottom: 14px;
  background: rgba(255, 248, 220, 0.25);
  transition: border-color 0.25s ease;
}
.proposal.decided { border-color: var(--dim); opacity: 0.92; }
.proposal-title {
  font-size: 14px;
  font-weight: bold;
  color: var(--bright);
  margin-bottom: 3px;
}
.proposal-author {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 10px;
}
.proposal-desc {
  font-size: 13px;
  color: var(--amber);
  line-height: 1.65;
  margin-bottom: 14px;
}
.decision-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.dec-btn {
  flex: 1;
  min-width: 90px;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.dec-btn:hover { border-color: var(--bright); color: var(--bright); }
.dec-btn.selected-approve { background: var(--approve); color: #f5e4c0; border-color: var(--approve); }
.dec-btn.selected-reject  { background: var(--reject);  color: #f5e4c0; border-color: var(--reject); }
.dec-btn.selected-flag    { background: var(--flag);    color: #f5e4c0; border-color: var(--flag); }
.dec-btn.dimmed { opacity: 0.3; }

.flag-explainer {
  margin-top: 10px;
  padding: 10px 14px;
  border-left: 2px solid var(--flag);
  background: rgba(90, 68, 22, 0.05);
  font-size: 12px;
  font-style: italic;
  color: var(--dim);
  line-height: 1.6;
}

/* Submit button area */
.submit-area {
  text-align: center;
  margin: 28px 0;
}
.submit-hint {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 14px;
}

/* Tension meter */
.tension-wrap {
  margin: 36px 0 20px;
  padding: 14px 0;
  border-top: 1px solid var(--dim);
  border-bottom: 1px solid var(--dim);
}
.tension-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
}
.tension-bar {
  position: relative;
  height: 6px;
  background: rgba(107, 72, 32, 0.15);
  border: 1px solid var(--dim);
}
.tension-marker {
  position: absolute;
  top: -5px;
  width: 3px;
  height: 16px;
  background: var(--bright);
  transition: left 0.6s ease;
  transform: translateX(-50%);
}
.tension-center {
  position: absolute;
  top: 0;
  left: 50%;
  height: 100%;
  width: 1px;
  background: var(--dim);
  opacity: 0.4;
}

/* Panel toggles */
.panel-toggles {
  display: flex;
  gap: 14px;
  justify-content: center;
  margin: 18px 0 0;
}
.panel-toggle {
  border: 1px solid var(--dim);
  color: var(--dim);
  background: transparent;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.panel-toggle:hover { color: var(--amber); border-color: var(--amber); }

/* Overlay panels */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(245, 228, 192, 0.96);
  z-index: 100;
  overflow-y: auto;
  padding: 40px 24px 80px;
  display: none;
}
.overlay.open { display: block; }
.overlay-inner {
  max-width: 760px;
  margin: 0 auto;
}
.overlay-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--dim);
}
.overlay-title {
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bright);
}
.overlay-close {
  border: 1px solid var(--dim);
  color: var(--dim);
  background: transparent;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 2px;
  padding: 6px 14px;
  cursor: pointer;
}
.overlay-close:hover { color: var(--amber); border-color: var(--amber); }

/* Discourse Map */
.map-svg {
  width: 100%;
  height: auto;
  display: block;
  margin-bottom: 20px;
}
.map-empty {
  text-align: center;
  color: var(--dim);
  font-style: italic;
  padding: 40px 0;
  font-size: 13px;
}
.map-legend {
  font-size: 12px;
  color: var(--dim);
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--dim);
}
.map-legend p { margin-bottom: 6px; }
.map-term-list {
  margin-top: 18px;
}
.map-term {
  border-left: 2px solid var(--dim);
  padding: 8px 14px;
  margin-bottom: 10px;
}
.map-term-name {
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bright);
  margin-bottom: 4px;
}
.map-term-gloss {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.6;
}

/* Journal */
.journal-entry {
  margin-bottom: 22px;
  padding: 14px 18px;
  border: 1px solid var(--dim);
  background: rgba(255, 248, 220, 0.3);
}
.journal-head {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px dashed var(--dim);
}
.journal-title {
  font-size: 13px;
  font-weight: bold;
  color: var(--bright);
  margin-bottom: 4px;
}
.journal-decision {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.journal-decision.d-approve { color: var(--approve); }
.journal-decision.d-reject  { color: var(--reject); }
.journal-decision.d-flag    { color: var(--flag); }
.journal-criteria {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.55;
}
.journal-annotation {
  margin-top: 12px;
  padding: 10px 14px;
  border-left: 2px solid var(--bright);
  background: rgba(26, 10, 0, 0.04);
  font-size: 12px;
  color: var(--amber);
  font-style: italic;
  line-height: 1.65;
  animation: fadeUp 0.8s ease-out both;
}
.journal-annotation strong { font-style: normal; color: var(--bright); }

.journal-empty {
  text-align: center;
  color: var(--dim);
  font-style: italic;
  padding: 40px 0;
  font-size: 13px;
}

/* Debrief */
.debrief-section {
  margin: 36px 0;
  padding-top: 20px;
  border-top: 1px solid var(--dim);
}
.debrief-label {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 16px;
}
.debrief-commentary {
  padding: 20px 24px;
  border-left: 3px solid var(--dim);
  background: rgba(255, 248, 220, 0.4);
  font-size: 13px;
  color: var(--amber);
  line-height: 1.85;
  margin-bottom: 24px;
}
.debrief-commentary p { margin-bottom: 12px; }
.debrief-commentary p:last-child { margin-bottom: 0; }
.debrief-terms-list .map-term { margin-bottom: 14px; }
.debrief-close {
  margin-top: 48px;
  display: flex;
  gap: 18px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

/* Left panel (Foucault portrait) */
#left-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: calc(50vw - 360px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
  pointer-events: none;
  overflow: hidden;
}
#left-panel img {
  max-width: 100%;
  max-height: 62vh;
  object-fit: contain;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}
#left-panel .left-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  text-align: center;
  margin-top: 10px;
}

@media (max-width: 919px) {
  #left-panel { display: none; }
}

.copy-feedback {
  font-size: 12px;
  color: var(--approve);
  font-style: italic;
  margin-left: 12px;
}
</style>
</head>

<div id="app">
  <div id="header">
    <a href="../index.html">&#x2190; Philosophy Games</a>
    <span class="game-label">The Committee</span>
  </div>
  <div id="content"></div>
</div>
<div id="map-overlay" class="overlay"></div>
<div id="journal-overlay" class="overlay"></div>

    name: 'Normalization',

      },
      {

// ─── Utility ───────────────────────────────────────────────────────────────

function div(cls, html) {
  var el = document.createElement('div');
  if (cls) el.className = cls;
  el.innerHTML = html;
  return el;
}

function scrollTop() { window.scrollTo({ top: 0, behavior: 'auto' }); }

function setLeftPanel(show) {
  if (!show) {
    leftPanel.innerHTML = '';
    leftPanel.style.opacity = '0';
    return;
  }
  leftPanel.innerHTML = '<img src="' + FOUCAULT_IMG.src + '" alt="' + FOUCAULT_IMG.alt + '" loading="lazy"><p class="left-attr">' + FOUCAULT_IMG.attr + '</p>';
  leftPanel.style.opacity = '1';
}

function tensionTier() {
  if (state.tension <= 33) return 'conformity';
  if (state.tension >= 67) return 'resistance';
  return 'mixed';
}

function applyDecisionToTension(proposal, decision) {
  if (decision === 'flag') {
    state.tension = Math.min(100, state.tension + 10);
    return;
  }
  // approve / reject
  if (proposal.pref === null) {
    // round 5 — no preference — mild movement based on choice
    // neither direction penalized
    return;
  }
  if (decision === proposal.pref) {
    state.tension = Math.max(0, state.tension - 5);
  } else {
    state.tension = Math.min(100, state.tension + 7);
  }
}

function renderTensionBar() {
  return '<div class="tension-wrap">\
    <div class="tension-labels"><span>Conformity</span><span>Resistance</span></div>\
    <div class="tension-bar">\
      <div class="tension-center"></div>\
      <div class="tension-marker" style="left:' + state.tension + '%"></div>\
    </div>\
  </div>';
}

function renderPanelToggles() {
  return '<div class="panel-toggles">\
    <button class="panel-toggle" id="open-map">Discourse Map</button>\
    <button class="panel-toggle" id="open-journal">Decision Journal</button>\
  </div>';
}

function attachPanelToggles(el) {
  var m = el.querySelector('#open-map');
  var j = el.querySelector('#open-journal');
  if (m) m.addEventListener('click', openMap);
  if (j) j.addEventListener('click', openJournal);
}

        <div class="proposal-desc">' + p.desc + '</div>\
        <div class="decision-btns">\
          <button class="dec-btn" data-decision="approve" data-proposal="' + p.id + '">Approve</button>\
          <button class="dec-btn" data-decision="reject"  data-proposal="' + p.id + '">Reject</button>\
          <button class="dec-btn" data-decision="flag"    data-proposal="' + p.id + '">Flag for Review</button>\
        </div>\
        <div class="flag-explainer" data-explainer="' + p.id + '" style="display:none;"></div>\
      </div>';
  });
  proposalsHtml += '</div>';

  // Submit area
  var submitHtml = '<div class="submit-area">\
    <p class="submit-hint" id="submit-hint">Decide on all proposals to continue.</p>\

  el.querySelector('.proposals-area').addEventListener('click', function(e) {
    var btn = e.target.closest('.dec-btn');
    if (!btn) return;
    var pid = btn.dataset.proposal;
    var decision = btn.dataset.decision;
    handleDecision(pid, decision, el);
  });

  el.querySelector('#submit-btn').addEventListener('click', function() {
    if (Object.keys(state.pendingDecisions).length !== dept.proposals.length) return;
    commitRound();
  });

  attachPanelToggles(el);
}

function handleDecision(proposalId, decision, el) {
  state.pendingDecisions[proposalId] = decision;

  // Update button visuals for this proposal
  var proposalEl = el.querySelector('[data-proposal="' + proposalId + '"]');
  proposalEl.querySelectorAll('.dec-btn').forEach(function(b) {
    b.classList.remove('selected-approve', 'selected-reject', 'selected-flag', 'dimmed');
  });
  var activeBtns = proposalEl.querySelectorAll('.dec-btn');
  activeBtns.forEach(function(b) {
    if (b.dataset.decision === decision) {
      b.classList.add('selected-' + decision);
    } else {
      b.classList.add('dimmed');
    }
  });

  // Show flag explainer if flagged
  var explainer = el.querySelector('[data-explainer="' + proposalId + '"]');
  if (decision === 'flag') {
    var proposal = findProposal(proposalId);
    explainer.textContent = proposal.flag;
    explainer.style.display = 'block';
  } else {
    explainer.style.display = 'none';
  }

  // Enable submit if all decided
  var dept = DEPARTMENTS[state.roundIndex];
  var submitBtn = el.querySelector('#submit-btn');
  var hint = el.querySelector('#submit-hint');
  if (Object.keys(state.pendingDecisions).length === dept.proposals.length) {
    submitBtn.disabled = false;
    hint.textContent = 'When you are ready, submit your evaluations.';
  }
}

function findProposal(pid) {
  for (var i = 0; i < DEPARTMENTS.length; i++) {
    var found = DEPARTMENTS[i].proposals.find(function(p) { return p.id === pid; });
    if (found) return found;
  }
  return null;
}

function commitRound() {
  var dept = DEPARTMENTS[state.roundIndex];
  dept.proposals.forEach(function(p) {
    var decision = state.pendingDecisions[p.id];
    state.decisions[p.id] = decision;
    state.allDecisions.push({
      proposalId: p.id,
      decision: decision,
      roundIndex: state.roundIndex
    });
    applyDecisionToTension(p, decision);
  });
  state.screen = 'response';
  render();
}

// ─── Discourse Map (SVG) ───────────────────────────────────────────────────

function buildMapSvg() {
  var completedRounds = state.roundIndex + (state.screen === 'response' || state.screen === 'debrief' ? 1 : 0);
  if (state.screen === 'debrief') completedRounds = 5;
  if (completedRounds === 0) return '<div class="map-empty">The map is empty. Decisions will begin populating it after Round 1.</div>';

  var W = 680, H = 420;
  var colW = W / 5;
  var svg = '<svg class="map-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';

  // Department columns
  for (var i = 0; i < Math.min(completedRounds, 5); i++) {
    var dept = DEPARTMENTS[i];
    var cx = colW * i + colW / 2;

    // Department label
    var deptName = dept.noDepartment ? 'Final' : 'Dept ' + (i + 1);
    svg += '<text x="' + cx + '" y="24" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#1a0a00" font-weight="bold">' + deptName + '</text>';

    // Criteria node
    var criteriaY = 56;
    svg += '<circle cx="' + cx + '" cy="' + criteriaY + '" r="6" fill="#6b4820" />';
    svg += '<text x="' + cx + '" y="' + (criteriaY + 20) + '" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#6b4820">criteria</text>';

    // Decision nodes (one per proposal)
    dept.proposals.forEach(function(p, idx) {
      var decision = state.decisions[p.id];
      if (!decision) return;
      var dy = 120 + idx * 60;
      var color = decision === 'approve' ? '#2d4a1e' : (decision === 'reject' ? '#6b1a1a' : '#5a4416');

      // Line from criteria to decision
      svg += '<line x1="' + cx + '" y1="' + (criteriaY + 6) + '" x2="' + cx + '" y2="' + (dy - 6) + '" stroke="#6b4820" stroke-width="1" opacity="0.5" />';

      // Decision node
      if (decision === 'flag') {
        // diamond for flag
        svg += '<polygon points="' + cx + ',' + (dy - 7) + ' ' + (cx + 7) + ',' + dy + ' ' + cx + ',' + (dy + 7) + ' ' + (cx - 7) + ',' + dy + '" fill="' + color + '" />';
      } else {
        svg += '<circle cx="' + cx + '" cy="' + dy + '" r="6" fill="' + color + '" />';
      }
    });
  }

  // Draw contradiction lines for reframed proposals
  // Find all proposals with the same reframeId that got different decisions
  var reframeGroups = {};
  for (var d = 0; d < DEPARTMENTS.length; d++) {
    DEPARTMENTS[d].proposals.forEach(function(p, pIdx) {
      if (!p.reframeId) return;
      if (!state.decisions[p.id]) return;
      if (!reframeGroups[p.reframeId]) reframeGroups[p.reframeId] = [];
      reframeGroups[p.reframeId].push({
        roundIdx: d,
        propIdx: pIdx,
        decision: state.decisions[p.id]
      });
    });
  }

  Object.keys(reframeGroups).forEach(function(key) {
    var group = reframeGroups[key];
    for (var a = 0; a < group.length; a++) {
      for (var b = a + 1; b < group.length; b++) {
        var A = group[a], B = group[b];
        if (A.decision !== B.decision) {
          var x1 = colW * A.roundIdx + colW / 2;
          var y1 = 120 + A.propIdx * 60;
          var x2 = colW * B.roundIdx + colW / 2;
          var y2 = 120 + B.propIdx * 60;
          svg += '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '" stroke="#1a0a00" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7" />';
        }
      }
    }
  });

  svg += '</svg>';
  return svg;
}

    <p>&#9679; <span style="color:#2d4a1e;">approve</span> &nbsp; &#9679; <span style="color:#6b1a1a;">reject</span> &nbsp; &#9670; <span style="color:#5a4416;">flag</span></p>\
    <p style="margin-top:8px;font-style:italic;">Dashed lines connect contradictory judgments of the same text across different departments.</p>\
  </div>';

  var termsHtml = '';
  if (state.termsRevealed.length > 0) {

    <div class="overlay-header">\
      <div class="overlay-title">Discourse Map</div>\
      <button class="overlay-close">Close</button>\
    </div>\
    ' + buildMapSvg() + '\
    ' + legend + '\
    ' + termsHtml + '\
  </div>';

  mapOverlay.classList.add('open');
  mapOverlay.querySelector('.overlay-close').addEventListener('click', function() {
    mapOverlay.classList.remove('open');
  });
  mapOverlay.scrollTop = 0;
}

// ─── Decision Journal ──────────────────────────────────────────────────────

function buildJournalEntries() {
  if (state.allDecisions.length === 0) {
    return '<div class="journal-empty">The journal is empty. Decisions will begin populating it after Round 1.</div>';
  }

  var html = '';
  state.allDecisions.forEach(function(entry, idx) {
    var proposal = findProposal(entry.proposalId);
    var dept = DEPARTMENTS[entry.roundIndex];
    var roundLabel = dept.noDepartment ? 'Final Review' : 'Round ' + (entry.roundIndex + 1);
    var deptLabel = dept.noDepartment ? 'No Department' : dept.name;
    var decLabel = entry.decision.toUpperCase();
    var critLabel = dept.criteria || 'No criteria provided';

    html += '<div class="journal-entry">\
      <div class="journal-head"><span>' + roundLabel + '</span><span>' + deptLabel + '</span></div>\
      <div class="journal-title">' + proposal.title + '</div>\
      <div class="journal-decision d-' + entry.decision + '">' + decLabel + '</div>\
      <div class="journal-criteria">Criteria: ' + critLabel + '</div>';

    // Annotations for reframed proposals
    if (proposal.reframeId) {
      var contradictions = findContradictionsFor(proposal.reframeId, entry);
      contradictions.forEach(function(c) {
        var otherDept = DEPARTMENTS[c.roundIndex];
        var otherLabel = otherDept.noDepartment ? 'No Department' : otherDept.name;
        var otherRound = otherDept.noDepartment ? 'Final Review' : 'Round ' + (c.roundIndex + 1);
        html += '<div class="journal-annotation">\
          <strong>Note:</strong> the same text (in different framing) was <strong>' + c.decision + 'ed</strong> in ' + otherRound + ' under ' + otherLabel + '. Neither decision was wrong within its frame. Both decisions were yours.\
        </div>';
      });
    }

    html += '</div>';
  });
  return html;
}

function findContradictionsFor(reframeId, currentEntry) {
  var results = [];
  state.allDecisions.forEach(function(e) {
    if (e === currentEntry) return;
    if (e.roundIndex >= currentEntry.roundIndex) return; // only look backward
    var p = findProposal(e.proposalId);
    if (p.reframeId === reframeId && e.decision !== currentEntry.decision) {
      results.push(e);
    }
  });
  return results;
}

function openJournal() {
  var entriesHtml = buildJournalEntries();
  var exportBtn = state.allDecisions.length > 0
    ? '<div style="margin-top:28px;text-align:center;">\
         <button class="btn" id="export-btn">Copy Journal to Clipboard</button>\
         <span class="copy-feedback" id="copy-feedback" style="display:none;">Copied.</span>\
       </div>'
    : '';

  journalOverlay.innerHTML = '<div class="overlay-inner">\
    <div class="overlay-header">\
      <div class="overlay-title">Decision Journal</div>\
      <button class="overlay-close">Close</button>\
    </div>\
    ' + entriesHtml + '\
    ' + exportBtn + '\
  </div>';

  journalOverlay.classList.add('open');
  journalOverlay.querySelector('.overlay-close').addEventListener('click', function() {
    journalOverlay.classList.remove('open');
  });
  var exp = journalOverlay.querySelector('#export-btn');
  if (exp) exp.addEventListener('click', exportJournal);
  journalOverlay.scrollTop = 0;
}

function exportJournal() {
  var lines = [];
  lines.push('THE COMMITTEE — DECISION JOURNAL');
  lines.push('Curriculum Review, Annual Course Catalog');
  lines.push('');

  state.allDecisions.forEach(function(entry) {
    var proposal = findProposal(entry.proposalId);
    var dept = DEPARTMENTS[entry.roundIndex];
    var roundLabel = dept.noDepartment ? 'Final Review' : 'Round ' + (entry.roundIndex + 1);
    var deptLabel = dept.noDepartment ? 'No Department' : dept.name;
    lines.push(roundLabel + ' — ' + deptLabel);
    lines.push('Proposal: ' + proposal.title + ' (' + proposal.author + ')');
    lines.push('Decision: ' + entry.decision.toUpperCase());
    if (dept.criteria) lines.push('Criteria applied: ' + dept.criteria);
    if (proposal.reframeId) {
      var contradictions = findContradictionsFor(proposal.reframeId, entry);
      contradictions.forEach(function(c) {
        var otherDept = DEPARTMENTS[c.roundIndex];
        var otherRound = otherDept.noDepartment ? 'Final Review' : 'Round ' + (c.roundIndex + 1);
        lines.push('  Note: the same text was ' + c.decision + 'ed in ' + otherRound + ' under ' + (otherDept.name || 'No Department') + '.');
      });
    }
    lines.push('');
  });

  lines.push('Final tension position: ' + state.tension + ' / 100');
  lines.push('Pattern: ' + tensionTier());

  var text = lines.join('\n');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var fb = document.getElementById('copy-feedback');
      if (fb) {
        fb.style.display = 'inline';
        setTimeout(function() { fb.style.display = 'none'; }, 2000);
      }
    });
  }
}

// ─── Render: Debrief ───────────────────────────────────────────────────────

function renderDebrief() {
  scrollTop();
  setLeftPanel(true);
  content.innerHTML = '';

  var tier = tensionTier();
  var closing = CLOSINGS[tier];
  var commentaryHtml = closing.text.map(function(p) { return '<p>' + p + '</p>'; }).join('');

  var termsListHtml = '';
  Object.keys(TERMS).forEach(function(k) {
    var t = TERMS[k];
    termsListHtml += '<div class="map-term">\
      <div class="map-term-name">' + t.name + '</div>\
      <div class="map-term-gloss">' + t.full + '</div>\
    </div>';
  });

  var el = div('fade-in', '\
    <div style="padding-top:40px;">\
      <div class="round-header">\
        <span class="dept-name">Committee Debrief</span>\
        <span class="round-label">Review Complete</span>\
      </div>\
      <p class="dept-subtitle">Reviewer pattern: ' + tier + '</p>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">' + closing.title + '</div>\
        <div class="debrief-commentary">' + commentaryHtml + '</div>\
      </div>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">Final Tension</div>\
        ' + renderTensionBar() + '\
      </div>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">Discourse Map</div>\
        ' + buildMapSvg() + '\
        <div class="map-legend">\
          <p>&#9679; <span style="color:#2d4a1e;">approve</span> &nbsp; &#9679; <span style="color:#6b1a1a;">reject</span> &nbsp; &#9670; <span style="color:#5a4416;">flag</span></p>\
          <p style="margin-top:8px;font-style:italic;">Dashed lines connect contradictory judgments of the same text across different departments.</p>\
        </div>\
      </div>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">Decision Journal</div>\
        <div style="margin-top:14px;">' + buildJournalEntries() + '</div>\
        <div style="text-align:center;margin-top:20px;">\
          <button class="btn" id="export-btn">Copy Journal to Clipboard</button>\
          <span class="copy-feedback" id="copy-feedback" style="display:none;">Copied.</span>\
        </div>\
      </div>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">Key Concepts</div>\
        <div class="debrief-terms-list">' + termsListHtml + '</div>\
      </div>\
      \
      <div class="debrief-close">\
        <button class="btn" id="home-btn">Return to Philosophy Games</button>\
        <button class="btn btn-secondary" id="restart-btn">Review Again</button>\
      </div>\
    </div>\
  ');
  content.appendChild(el);

  el.querySelector('#export-btn').addEventListener('click', exportJournal);
  el.querySelector('#home-btn').addEventListener('click', function() {
    window.location.href = '../index.html';
  });
  el.querySelector('#restart-btn').addEventListener('click', function() {
    state.screen = 'title';
    state.roundIndex = 0;
    state.decisions = {};
    state.allDecisions = [];
    state.tension = 50;
    state.termsRevealed = [];
    state.pendingDecisions = {};
    render();
  });
}

// ─── Router ────────────────────────────────────────────────────────────────

function render() {
  if      (state.screen === 'title')    renderTitle();
  else if (state.screen === 'memo')     renderMemo();
  else if (state.screen === 'round')    renderRound();
  else if (state.screen === 'response') renderResponse();
  else if (state.screen === 'debrief')  renderDebrief();
}

render();
</script>
</body>
</html>
