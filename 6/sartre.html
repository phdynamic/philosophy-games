<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Good, the Bad, and the Authentic — Philosophy Games</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5e4c0;
  --amber: #3d2005;
  --dim: #6b4820;
  --bright: #1a0a00;
  --font: 'Courier New', Courier, monospace;
}

html { overflow-y: scroll; }

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--amber);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

#app {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--dim);
  font-size: 12px;
}

#header a {
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#header a:hover { color: var(--amber); }

#header .game-label {
  color: var(--bright);
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 12px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.9s ease-out both; }

/* Title screen */
#title-screen {
  padding: 80px 0 60px;
  text-align: center;
}

#title-screen h1 {
  font-size: 22px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 12px;
}

.title-subtitle {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 40px;
}

.title-portrait {
  width: 220px;
  max-width: 60%;
  display: block;
  margin: 0 auto 32px;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}

.title-portrait-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 40px;
}

.epigraph {
  color: var(--dim);
  font-size: 13px;
  font-style: italic;
  max-width: 460px;
  margin: 0 auto 10px;
  line-height: 1.8;
}

.epigraph-attr {
  color: var(--dim);
  font-size: 12px;
  margin-bottom: 56px;
}

.btn {
  display: inline-block;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 32px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn:hover { border-color: var(--bright); color: var(--bright); }

.btn-secondary {
  border-color: transparent;
  color: var(--dim);
  font-size: 13px;
  letter-spacing: 2px;
  padding: 8px 0;
}
.btn-secondary:hover { border-color: transparent; color: var(--amber); }

/* Instructions screen */
#instructions-screen {
  padding: 60px 0 40px;
}

#instructions-screen h2 {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  margin-bottom: 32px;
}

#instructions-screen p {
  color: var(--amber);
  margin-bottom: 14px;
  max-width: 560px;
}

#instructions-screen p.dim {
  color: var(--dim);
  font-size: 13px;
}

/* Scenario header */
.scenario-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
}

.scenario-num {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--dim);
  text-transform: uppercase;
}

.scenario-title {
  font-size: 17px;
  font-weight: bold;
  letter-spacing: 2px;
  color: var(--bright);
  text-transform: uppercase;
}

/* Scenario text */
.scenario-text {
  margin-bottom: 32px;
}

.scenario-text p {
  margin-bottom: 14px;
  color: var(--amber);
}

/* Choice buttons */
.choices-area {
  margin-bottom: 32px;
}

.choices-label {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 14px;
}

.choice-btn {
  display: block;
  width: 100%;
  text-align: left;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.55;
  padding: 14px 18px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.choice-btn:hover { border-color: var(--bright); color: var(--bright); }

/* Result verdict */
.result-verdict {
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.result-verdict.authentic { color: var(--bright); }
.result-verdict.bad-faith { color: var(--dim); }

/* Sartre commentary */
.sartre-wrap {
  margin: 28px 0 0;
  padding-left: 20px;
  border-left: 2px solid var(--dim);
  animation: sartreFadeIn 1.2s ease-out both;
}

@keyframes sartreFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.sartre-line {
  font-size: 13px;
  font-style: italic;
  color: var(--dim);
  line-height: 1.8;
  margin-bottom: 10px;
}
.sartre-line:last-child { margin-bottom: 0; }

.sartre-source {
  font-size: 12px;
  color: var(--dim);
  margin-top: 12px;
  letter-spacing: 1px;
}

/* Stick figure */
.figure-area {
  text-align: center;
  margin: 24px 0;
}

.figure-svg {
  width: 140px;
  height: 190px;
}

.figure-svg.large {
  width: 180px;
  height: 240px;
}

.figure-drawn {
  stroke: var(--amber);
  stroke-width: 3;
  stroke-linecap: round;
  fill: none;
  transition: opacity 0.8s ease-in;
}

.figure-ghost {
  stroke: var(--dim);
  stroke-width: 2;
  stroke-linecap: round;
  fill: none;
  opacity: 0.15;
}

/* Progress dots */
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px 0;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid var(--dim);
}

.dot.authentic { background: var(--amber); border-color: var(--amber); }
.dot.bad-faith { background: transparent; border-color: var(--dim); position: relative; }
.dot.bad-faith::after {
  content: '\00d7';
  position: absolute;
  top: -2px;
  left: 2px;
  font-size: 12px;
  color: var(--dim);
}
.dot.pending { background: transparent; border-color: var(--dim); opacity: 0.3; }

/* Ending */
.ending-text p { margin-bottom: 14px; color: var(--amber); }

.ending-title {
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bright);
  text-align: center;
  margin-bottom: 24px;
}

.ending-close {
  margin-top: 56px;
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

/* Left panel */
#left-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: calc(50vw - 340px);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 28px;
  pointer-events: none;
  overflow: hidden;
}

#left-panel img {
  max-width: 100%;
  max-height: 62vh;
  object-fit: contain;
  display: block;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}

#left-panel .left-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  text-align: center;
  margin-top: 10px;
  line-height: 1.5;
}

@media (max-width: 879px) {
  #left-panel { display: none; }
}

/* Demo figure in instructions */
.demo-figure {
  text-align: center;
  margin: 40px 0;
}

.demo-caption {
  font-size: 13px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-top: 8px;
}
</style>
</head>

  },
  {
    min: 4, max: 5, title: 'Almost Whole',
    text: ['Most of your lines are your own. A few were borrowed &#8212; from the crowd, from comfort, from the easy refusal to see that you were choosing.', 'But you caught yourself. That is more than most manage. The bad faith was there &#8212; I saw it, the flinch, the moment you reached for someone else&#8217;s answer &#8212; but it did not hold. You came back to yourself.', 'The figure is not complete. It never is while you are alive. But what is drawn is drawn by your hand, and the gaps are honest gaps &#8212; you know they are there, and you know why.', 'That knowing is itself a kind of freedom. The person who sees their own bad faith clearly has already begun to overcome it.']
  },
  {
    min: 2, max: 3, title: 'Half-Drawn',
    text: ['Half a person. Half drawn by freedom, half left blank by the refusal to choose &#8212; or rather, by the choice to pretend you were not choosing.', 'I do not judge you for this. I only point out that it was yours. The flinch was yours. The deflection was yours. The priest, the role, the comfortable lie &#8212; you reached for them, and reaching for them was itself an act of freedom. Even bad faith is chosen.', 'You wanted to be authentic. I could see it in the moments where you hesitated, where the easy answer almost won and you pulled back. But wanting is not enough. Authenticity is not a feeling. It is a practice &#8212; a relentless, exhausting practice of refusing to lie to yourself.', 'The figure is half-drawn. The other half is not lost. It is waiting for the next moment in which you refuse to hide.']
  },
  {
    min: 0, max: 1, title: 'The Blank',
    text: ['You let others draw you &#8212; or rather, you let them leave you blank. Every time freedom knocked, you pretended not to be home. The priest&#8217;s answer, the comfortable role, the crowd&#8217;s opinion, the easy denial &#8212; you reached for them the way a drowning person reaches for anything solid.', 'But hear me: even this was a choice. Every deflection was a decision. Every act of bad faith was an act &#8212; which means it was free. You chose to hide from your freedom, and that hiding was itself an exercise of the very freedom you were hiding from.', 'This is what I meant when I said you are condemned to be free. Not that freedom is a gift. Not that freedom is pleasant. That freedom is inescapable. You cannot not-choose. Silence is a choice. Obedience is a choice. Even surrender is a choice.', 'The figure is nearly blank. But the blankness is not nothing. It is the record of a freedom that refused itself &#8212; which means it can stop refusing at any moment. You are not your past choices. You are the freedom that made them. And that freedom is still here.']
  }
];

// ─── State ─────────────────────────────────────────────────────────────────

var state = {
  screen: 'title',
  scenarioIndex: 0,
  authenticCount: 0,
  choices: [],
  currentChoice: null
};

var content = document.getElementById('content');
var leftPanel = document.getElementById('left-panel');

// ─── Utility ───────────────────────────────────────────────────────────────

function div(cls, html) {
  var el = document.createElement('div');
  if (cls) el.className = cls;
  el.innerHTML = html;
  return el;
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function setLeftPanel(show) {
  if (!show) {
    leftPanel.innerHTML = '';
    leftPanel.style.opacity = '0';
    return;
  }
  leftPanel.innerHTML = '<img src="' + SARTRE_IMG.src + '" alt="' + SARTRE_IMG.alt + '" onerror="this.style.display=\'none\'" loading="lazy"><p class="left-attr">' + SARTRE_IMG.attr + '</p>';
  leftPanel.style.opacity = '1';
}

var ROMAN = ['I', 'II', 'III', 'IV', 'V', 'VI'];

// ─── SVG Figure ────────────────────────────────────────────────────────────

function buildFigureSvg(partsDrawn, large) {
  var cls = large ? 'figure-svg large' : 'figure-svg';
  var parts = [
    '<circle cx="60" cy="36" r="20" />',
    '<line x1="60" y1="56" x2="60" y2="120" />',
    '<line x1="60" y1="76" x2="28" y2="100" />',
    '<line x1="60" y1="76" x2="92" y2="100" />',
    '<line x1="60" y1="120" x2="32" y2="170" />',
    '<line x1="60" y1="120" x2="88" y2="170" />'
  ];
  var svg = '<svg class="' + cls + '" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg">';
  for (var i = 0; i < 6; i++) {
    if (i < partsDrawn) {
      svg += '<g class="figure-drawn">' + parts[i] + '</g>';
    } else {
      svg += '<g class="figure-ghost">' + parts[i] + '</g>';
    }
  }
  svg += '</svg>';
  return svg;
}

// ─── Progress Dots ─────────────────────────────────────────────────────────

function buildProgressDots() {
  var html = '<div class="progress-dots">';
  for (var i = 0; i < 6; i++) {
    if (i < state.choices.length) {
      html += '<div class="dot ' + (state.choices[i].authentic ? 'authentic' : 'bad-faith') + '"></div>';
    } else {
      html += '<div class="dot pending"></div>';
    }
  }
  html += '</div>';
  return html;
}

// ─── Render: Title ─────────────────────────────────────────────────────────

function renderTitle() {
  scrollTop();
  setLeftPanel(false);
  content.innerHTML = '';
  var el = div('fade-in', '\
    <div id="title-screen">\
      <h1>The Good, the Bad, and the Authentic</h1>\
      <div class="title-subtitle">a game of radical freedom</div>\
      <img class="title-portrait" src="' + SARTRE_IMG.src + '" alt="' + SARTRE_IMG.alt + '" onerror="this.style.display=\'none\'" loading="lazy">\
      <p class="title-portrait-attr">' + SARTRE_IMG.attr + '</p>\
      <p class="epigraph">&#8220;Man is condemned to be free; because once thrown into the world, he is responsible for everything he does.&#8221;</p>\
      <p class="epigraph-attr">&#8212; Sartre, <em>Existentialism Is a Humanism</em>, 1946</p>\
      <button class="btn" id="begin-btn">Begin</button>\
    </div>\
  ');
  content.appendChild(el);
  el.querySelector('#begin-btn').addEventListener('click', function() {
    state.screen = 'instructions';
    render();
  });
}

// ─── Render: Instructions ──────────────────────────────────────────────────

function renderInstructions() {
  scrollTop();
  setLeftPanel(false);
  content.innerHTML = '';
  var el = div('fade-in', '\
    <div id="instructions-screen">\
      <h2>How This Works</h2>\
      <p>You are about to live a life &#8212; or at least six moments of one. Each presents a choice. There are no correct answers. There are no instructions.</p>\
      <p>But some choices are made in freedom, and some are made in what Sartre called <em>bad faith</em> &#8212; the refusal to acknowledge that you are free, the pretense that you had no choice, that the role chose you, that someone else decided.</p>\
      <p>You will not know which is which until after you have chosen. This, too, is the point.</p>\
      <p>Each authentic choice draws a part of the figure. Each act of bad faith leaves it blank. At the end, the figure is who you became.</p>\
      <div class="demo-figure">' + buildFigureSvg(3, false) + '<p class="demo-caption">Three choices made &#8212; three yet to come</p></div>\
      <p class="dim">There are six scenarios. The game takes about five minutes.</p>\
      <div style="margin-top: 40px;">\
        <button class="btn" id="start-btn">Begin</button>\
      </div>\
    </div>\
  ');
  content.appendChild(el);
  el.querySelector('#start-btn').addEventListener('click', function() {
    state.scenarioIndex = 0;
    state.authenticCount = 0;
    state.choices = [];
    state.screen = 'scenario';
    render();
  });
}

// ─── Render: Scenario ──────────────────────────────────────────────────────

function renderScenario() {
  scrollTop();
  setLeftPanel(true);
  content.innerHTML = '';

  var scenario = SCENARIOS[state.scenarioIndex];
  var choicesHtml = '';
  for (var i = 0; i < scenario.choices.length; i++) {
    choicesHtml += '<button class="choice-btn" data-idx="' + i + '">' + scenario.choices[i].text + '</button>';
  }

  var el = div('fade-in', '\
    <div style="padding-top:32px;">\
      <div class="scenario-header">\
        <span class="scenario-num">' + ROMAN[state.scenarioIndex] + '</span>\
        <span class="scenario-title">' + scenario.title + '</span>\
      </div>\
      <div class="figure-area">' + buildFigureSvg(state.authenticCount, false) + '</div>\
      ' + buildProgressDots() + '\
      <div class="scenario-text"><p>' + scenario.text + '</p></div>\
      <div class="choices-area">\
        <p class="choices-label">What do you do?</p>\
        ' + choicesHtml + '\
      </div>\
    </div>\
  ');

  content.appendChild(el);
  el.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(btn.dataset.idx);
      handleChoice(idx);
    });
  });
}

function handleChoice(choiceIndex) {
  var scenario = SCENARIOS[state.scenarioIndex];
  var choice = scenario.choices[choiceIndex];
  if (choice.authentic) {
    state.authenticCount++;
  }
  state.choices.push({ scenarioId: scenario.id, choiceIndex: choiceIndex, authentic: choice.authentic });
  state.currentChoice = choiceIndex;
  state.screen = 'result';
  render();
}

// ─── Render: Result ────────────────────────────────────────────────────────

function renderResult() {
  scrollTop();
  setLeftPanel(true);
  content.innerHTML = '';

  var scenario = SCENARIOS[state.scenarioIndex];
  var choice = scenario.choices[state.currentChoice];
  var verdictCls = choice.authentic ? 'authentic' : 'bad-faith';
  var verdictText = choice.authentic ? 'Authentic' : 'Bad Faith';

  var commentaryHtml = '';
  for (var i = 0; i < choice.sartre.length; i++) {
    commentaryHtml += '<p class="sartre-line">' + choice.sartre[i] + '</p>';
  }

  var el = div('fade-in', '\
    <div style="padding-top:32px;">\
      <div class="scenario-header">\
        <span class="scenario-num">' + ROMAN[state.scenarioIndex] + '</span>\
        <span class="scenario-title">' + scenario.title + '</span>\
      </div>\
      <div class="figure-area">' + buildFigureSvg(state.authenticCount, false) + '</div>\
      ' + buildProgressDots() + '\
      <p class="result-verdict ' + verdictCls + '">' + verdictText + '</p>\
      <div class="sartre-wrap">\
        ' + commentaryHtml + '\
        <p class="sartre-source">&#8212; ' + choice.source + '</p>\
      </div>\
      <div style="margin-top:32px;text-align:center;">\
        <button class="btn" id="continue-btn">Continue</button>\
      </div>\
    </div>\
  ');

  content.appendChild(el);
  el.querySelector('#continue-btn').addEventListener('click', function() {
    if (state.scenarioIndex < SCENARIOS.length - 1) {
      state.scenarioIndex++;
      state.screen = 'scenario';
    } else {
      state.screen = 'ending';
    }
    render();
  });
}

// ─── Render: Ending ────────────────────────────────────────────────────────

function renderEnding() {
  scrollTop();
  setLeftPanel(true);
  content.innerHTML = '';

  var ending = null;
  for (var i = 0; i < ENDINGS.length; i++) {
    if (state.authenticCount >= ENDINGS[i].min && state.authenticCount <= ENDINGS[i].max) {
      ending = ENDINGS[i];
      break;
    }
  }

  var monologueHtml = '';
  for (var j = 0; j < ending.text.length; j++) {
    monologueHtml += '<p class="sartre-line">' + ending.text[j] + '</p>';
  }

  var el = div('fade-in', '\
    <div style="padding-top:32px;">\
      <div class="figure-area">' + buildFigureSvg(state.authenticCount, true) + '</div>\
      <p class="ending-title">' + ending.title + '</p>\
      <p style="text-align:center;color:var(--dim);font-size:13px;margin-bottom:32px;">' + state.authenticCount + ' of 6 choices were authentic</p>\
      <div class="sartre-wrap" style="margin-top:0;">\
        ' + monologueHtml + '\
      </div>\
      <div class="ending-text" style="margin-top:36px;">\
        <p>Jean-Paul Sartre published <em>Being and Nothingness</em> in 1943, during the German occupation of Paris. He was offered the Nobel Prize for Literature in 1964 and refused it, saying he did not wish to be &#8220;institutionalised.&#8221; He died in 1980. Fifty thousand people attended his funeral.</p>\
        <p>His insistence that we are radically free &#8212; that no God, no nature, no social role can determine who we are &#8212; remains one of the most challenging and liberating ideas in the history of philosophy.</p>\
        <p style="color:var(--dim);font-style:italic;margin-top:20px;">&#8220;Existence precedes essence.&#8221;</p>\
        <p style="color:var(--dim);font-size:12px;">&#8212; <em>Being and Nothingness</em>, 1943</p>\
      </div>\
      <div class="ending-close">\
        <button class="btn" id="home-btn">Return to Philosophy Games</button>\
        <button class="btn btn-secondary" id="restart-btn">Play Again</button>\
      </div>\
    </div>\
  ');

  content.appendChild(el);
  el.querySelector('#home-btn').addEventListener('click', function() {
    window.location.href = '../index.html';
  });
  el.querySelector('#restart-btn').addEventListener('click', function() {
    state.screen = 'title';
    state.scenarioIndex = 0;
    state.authenticCount = 0;
    state.choices = [];
    render();
  });
}

// ─── Router ────────────────────────────────────────────────────────────────

function render() {
  if      (state.screen === 'title')        renderTitle();
  else if (state.screen === 'instructions') renderInstructions();
  else if (state.screen === 'scenario')     renderScenario();
  else if (state.screen === 'result')       renderResult();
  else if (state.screen === 'ending')       renderEnding();
}

render();
</script>
</body>
</html>
