<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Maltese Essence — Philosophy Games</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5e4c0;
  --amber: #3d2005;
  --dim: #6b4820;
  --bright: #1a0a00;
  --strike: #8a3a1e;
  --confirm: #2d4a1e;
  --witt: #5a2c52;
  --font: 'Courier New', Courier, monospace;
}

html { overflow-y: scroll; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--amber);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

#app { max-width: 1120px; margin: 0 auto; padding: 0 24px 80px; }

#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--dim);
  font-size: 12px;
}
#header a {
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#header a:hover { color: var(--amber); }
#header .game-label {
  color: var(--bright);
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-size: 12px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.9s ease-out both; }

@keyframes strikeIn {
  from { text-decoration-color: transparent; }
  to   { text-decoration-color: var(--strike); }
}

/* Title / opening */
#title-screen { padding: 70px 0 40px; text-align: center; max-width: 680px; margin: 0 auto; }
#title-screen h1 {
  font-size: 24px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 10px;
}
.title-sub {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 36px;
}
.title-portrait {
  width: 220px;
  max-width: 60%;
  display: block;
  margin: 0 auto 28px;
  filter: grayscale(25%) sepia(45%) brightness(0.88) contrast(1.06);
}
.title-portrait-attr {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-bottom: 40px;
}
.epigraph {
  color: var(--dim);
  font-size: 13px;
  font-style: italic;
  max-width: 520px;
  margin: 0 auto 10px;
  line-height: 1.85;
}
.epigraph-attr {
  color: var(--dim);
  font-size: 12px;
  margin-bottom: 48px;
}

.btn {
  display: inline-block;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 32px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn:hover { border-color: var(--bright); color: var(--bright); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-secondary {
  border-color: transparent;
  color: var(--dim);
  font-size: 12px;
  letter-spacing: 2px;
  padding: 8px 0;
}
.btn-secondary:hover { border-color: transparent; color: var(--amber); }
.btn-close {
  border-color: var(--strike);
  color: var(--strike);
}
.btn-close:hover { border-color: var(--strike); color: var(--bright); background: rgba(138, 58, 30, 0.08); }

/* Opening cutscene */
#opening-screen { padding: 60px 0 40px; max-width: 640px; margin: 0 auto; }
.cutscene-beat {
  margin-bottom: 22px;
  font-size: 15px;
  line-height: 1.8;
  color: var(--amber);
}
.cutscene-beat.spade { font-style: italic; color: var(--bright); }
.cutscene-beat.speech {
  padding-left: 18px;
  border-left: 2px solid var(--dim);
  color: var(--amber);
}

/* Case selection */
#case-select-screen { padding: 48px 0; }
.case-select-title {
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  text-align: center;
  font-weight: bold;
  margin-bottom: 12px;
}
.case-select-sub {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--dim);
  text-align: center;
  font-style: italic;
  margin-bottom: 40px;
}
.case-folders {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 18px;
  max-width: 880px;
  margin: 0 auto;
}
.case-folder {
  border: 1px solid var(--dim);
  background: rgba(255, 248, 220, 0.4);
  padding: 22px 22px 20px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  position: relative;
}
.case-folder:hover {
  border-color: var(--bright);
  background: rgba(255, 248, 220, 0.7);
}
.case-folder-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.case-folder-name {
  font-size: 22px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 10px;
}
.case-folder-desc {
  font-size: 13px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.6;
}

/* Interrogation three-panel layout */
.interrogation-wrap {
  display: grid;
  grid-template-columns: 240px 1fr 260px;
  gap: 20px;
  margin-top: 28px;
}

@media (max-width: 879px) {
  .interrogation-wrap {
    grid-template-columns: 1fr;
    gap: 14px;
  }
}

.panel {
  border: 1px solid var(--dim);
  padding: 16px 18px;
  background: rgba(255, 248, 220, 0.3);
}
.panel-title {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  padding-bottom: 8px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--dim);
}

/* Dossier panel */
.dossier-case {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 8px;
}
.dossier-count {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-bottom: 14px;
}
.suspect-portrait {
  width: 100%;
  aspect-ratio: 1;
  border: 1px solid var(--dim);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--dim);
  background: rgba(107, 72, 32, 0.06);
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.suspect-portrait::before {
  content: '';
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px dashed var(--dim);
  opacity: 0.4;
}
.suspect-portrait-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  position: relative;
  z-index: 1;
}
.suspect-name {
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--bright);
  margin-bottom: 4px;
}
.suspect-desc {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.55;
  margin-bottom: 14px;
}
.dossier-features-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
  padding-top: 10px;
  border-top: 1px dashed var(--dim);
}
.dossier-feature {
  font-size: 12px;
  color: var(--amber);
  padding: 2px 0;
  line-height: 1.5;
}
.dossier-feature.yes::before { content: '+ '; color: var(--confirm); font-weight: bold; }
.dossier-feature.no::before  { content: '- '; color: var(--strike); font-weight: bold; }
.dossier-feature-empty {
  font-size: 11px;
  color: var(--dim);
  font-style: italic;
}

/* Center panel — Interrogation */
.monologue {
  font-style: italic;
  color: var(--bright);
  font-size: 14px;
  line-height: 1.75;
  padding: 10px 0 18px;
  border-bottom: 1px dashed var(--dim);
  margin-bottom: 16px;
}
.testimony-area {
  min-height: 80px;
  padding: 14px 16px;
  border-left: 2px solid var(--amber);
  background: rgba(107, 72, 32, 0.04);
  margin-bottom: 20px;
}
.testimony-head {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.testimony-answer {
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.testimony-answer.yes { color: var(--confirm); }
.testimony-answer.no  { color: var(--strike); }
.testimony-line {
  font-size: 14px;
  color: var(--amber);
  line-height: 1.7;
  font-style: italic;
}
.testimony-placeholder {
  font-size: 13px;
  color: var(--dim);
  font-style: italic;
  padding: 14px 0;
}

.questions-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 12px;
}
.question-btn {
  display: block;
  width: 100%;
  text-align: left;
  border: 1px solid var(--dim);
  color: var(--amber);
  background: transparent;
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 14px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.question-btn:hover { border-color: var(--bright); color: var(--bright); background: rgba(255, 248, 220, 0.5); }
.question-btn.asked { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; text-decoration-color: var(--dim); }
.question-btn.asked:hover { border-color: var(--dim); color: var(--amber); background: transparent; }

.interrogation-actions {
  margin-top: 22px;
  padding-top: 14px;
  border-top: 1px solid var(--dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.question-counter {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--dim);
}

/* Essence Profile panel */
.confidence-wrap {
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--dim);
}
.confidence-head {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.confidence-value {
  color: var(--bright);
  font-weight: bold;
}
.confidence-bar {
  height: 6px;
  background: rgba(107, 72, 32, 0.15);
  border: 1px solid var(--dim);
  position: relative;
  overflow: hidden;
}
.confidence-fill {
  height: 100%;
  background: var(--amber);
  transition: width 0.6s ease, background 0.4s;
}
.confidence-fill.low { background: var(--strike); }

.essence-empty {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  line-height: 1.65;
  padding: 16px 0;
  text-align: center;
}
.essence-feature {
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px dashed rgba(107, 72, 32, 0.4);
  animation: fadeUp 0.6s ease-out both;
}
.essence-feature:last-child { border-bottom: none; }
.essence-feature.confirmed {
  color: var(--amber);
}
.essence-feature.contradicted {
  color: var(--dim);
  text-decoration: line-through;
  text-decoration-color: var(--strike);
  text-decoration-thickness: 1.5px;
}
.essence-feature-note {
  display: block;
  margin-top: 3px;
  font-size: 11px;
  color: var(--strike);
  font-style: italic;
  text-decoration: none;
  letter-spacing: 0.5px;
}

.close-case-wrap {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--dim);
}
.close-case-btn {
  width: 100%;
  border: 1px solid var(--strike);
  color: var(--strike);
  background: transparent;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 8px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.4;
}
.close-case-btn:hover { background: rgba(138, 58, 30, 0.08); color: var(--bright); }

/* Wittgenstein interlude */
.witt-overlay {
  margin: 28px 0;
  padding: 28px 32px;
  border: 1px solid var(--witt);
  background: rgba(90, 44, 82, 0.04);
  animation: fadeUp 1.1s ease-out both;
}
.witt-speaker {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--witt);
  margin-bottom: 12px;
}
.witt-line {
  font-size: 15px;
  color: var(--bright);
  font-style: italic;
  line-height: 1.9;
  margin-bottom: 10px;
}
.witt-source {
  font-size: 11px;
  color: var(--witt);
  margin-top: 8px;
  letter-spacing: 1px;
}

/* Debrief */
#debrief-screen { padding-top: 30px; }
.debrief-title {
  font-size: 18px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  text-align: center;
  margin-bottom: 8px;
}
.debrief-sub {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--dim);
  text-align: center;
  font-style: italic;
  margin-bottom: 36px;
}
.debrief-monologue {
  padding: 22px 28px;
  border-left: 3px solid var(--dim);
  background: rgba(255, 248, 220, 0.4);
  margin-bottom: 36px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--amber);
  font-style: italic;
}
.debrief-monologue p { margin-bottom: 12px; }
.debrief-monologue p:last-child { margin-bottom: 0; }
.debrief-section {
  margin-bottom: 36px;
  padding-top: 18px;
  border-top: 1px solid var(--dim);
}
.debrief-label {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--bright);
  font-weight: bold;
  margin-bottom: 14px;
}
.debrief-close {
  margin-top: 48px;
  display: flex;
  gap: 18px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

/* Resemblance web */
.web-svg {
  width: 100%;
  height: auto;
  display: block;
  margin: 16px 0;
}
.web-legend {
  font-size: 12px;
  color: var(--dim);
  font-style: italic;
  margin-top: 10px;
  padding-top: 12px;
  border-top: 1px dashed var(--dim);
}

/* Final report export */
.report-area {
  padding: 16px 20px;
  border: 1px solid var(--dim);
  background: rgba(255, 248, 220, 0.4);
  font-size: 12px;
  color: var(--amber);
  line-height: 1.7;
  white-space: pre-wrap;
  max-height: 280px;
  overflow-y: auto;
  margin-bottom: 14px;
}
.copy-feedback {
  font-size: 12px;
  color: var(--confirm);
  font-style: italic;
  margin-left: 12px;
}

.suspect-portrait-initial {
  font-size: 44px;
  letter-spacing: 8px;
  color: var(--dim);
  font-weight: bold;
  position: relative;
  z-index: 1;
  opacity: 0.55;
}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <a href="../index.html">&#x2190; Philosophy Games</a>
    <span class="game-label">The Maltese Essence</span>
  </div>
  <div id="content"></div>
</div>

<script>
// ─── Image ─────────────────────────────────────────────────────────────────

var WITT_IMG = {
  src: 'https://commons.wikimedia.org/wiki/Special:FilePath/Ludwig_Wittgenstein.jpg?width=900',
  alt: 'Photograph of Ludwig Wittgenstein',
  attr: '<em>Ludwig Wittgenstein</em>, photograph.'
};

// ─── Opening cutscene beats ────────────────────────────────────────────────

var OPENING_BEATS = [
  { kind: 'spade', text: 'Rain on the window. The kind of night where every concept in the city gets to looking a little shifty. I was nursing a cup of something bitter and halfway through a file that didn\'t add up when the door opened.' },
  { kind: 'spade', text: 'She came in dressed like a question nobody had ever asked me before. Said she was a philosopher. Said she had a problem.' },
  { kind: 'speech', speaker: 'Client', text: '&#8220;I need to know what something <em>really is</em>, Mr. Spade. I need its essence. What makes it that thing and not some other thing. I don\'t care what it takes. I don\'t care who you have to shake down.&#8221;' },
  { kind: 'spade', text: 'Every concept\'s got a heart, lady. I told her. You give me a name and I\'ll find the thing underneath the name. That\'s what I do.' },
  { kind: 'speech', speaker: 'Client', text: '&#8220;I\'ll pay double your rate. Just get me an answer.&#8221;' },
  { kind: 'spade', text: 'She slid a folder across the desk. Four cases. Four concepts waiting to be cracked. I lit a metaphorical cigarette. Picked up the folder. Picked a case.' }
];

// ─── Wittgenstein interjections (triggered by contradiction count) ─────────

var WITT_LINES = [
  {
    threshold: 3,
    lines: [
      'Don\'t say: &#8220;There <em>must</em> be something common, or they would not be called the same name&#8221; &#8212; but look and see whether there is anything common to all.',
      'For if you look at them, you will not see something that is common to all, but similarities, relationships, and a whole series of them at that.'
    ],
    source: 'Philosophical Investigations §66'
  },
  {
    threshold: 6,
    lines: [
      'I can think of no better expression to characterize these similarities than &#8220;family resemblances.&#8221;',
      'For the various resemblances between members of a family &#8212; build, features, colour of eyes, gait, temperament, and so on &#8212; overlap and criss-cross in the same way.'
    ],
    source: 'Philosophical Investigations §67'
  },
  {
    threshold: 9,
    lines: [
      'The result of this examination is: we see a complicated network of similarities overlapping and criss-crossing.',
      'And I shall say: &#8220;games&#8221; form a family.'
    ],
    source: 'Philosophical Investigations §66&#8211;67'
  }
];

// Final line at debrief
var WITT_FINAL = {
  lines: [
    'You were looking for what they all share. You found what they share in pairs, in trios, in odd groupings. Overlapping fibres. No single thread running the length of the rope.',
    'That is what there is. And that is enough.'
  ],
  source: 'Philosophical Investigations §67'
};

// ─── Case: GAME ────────────────────────────────────────────────────────────

var CASES = {};

CASES.game = {
  id: 'game',
  name: 'GAME',
  description: 'A common word. Used a thousand times a day. Should be easy.',
  features: [
    { id: 'rules',       text: 'Does it have rules?' },
    { id: 'winner',      text: 'Is there a winner?' },
    { id: 'competitive', text: 'Is it competitive?' },
    { id: 'skill',       text: 'Does it require skill?' },
    { id: 'fun',         text: 'Is it supposed to be fun?' },
    { id: 'players',     text: 'Does it need two or more players?' },
    { id: 'end',         text: 'Does it have an end state?' }
  ],
  suspects: [
    {
      id: 'chess', name: 'CHESS',
      description: 'Wooden pieces. A rulebook thick as a phonebook. Looked like a game to me.',
      introMonologue: 'First one through the door. Dressed in black and white. Didn\'t waste my time. If chess wasn\'t a game, nothing was.',
      answers: {
        rules:       { yes: true,  line: '&#8220;Buddy, I <em>am</em> rules. Sixty-four squares. Everything in writing.&#8221;' },
        winner:      { yes: true,  line: '&#8220;Somebody\'s king goes down. That\'s a winner.&#8221;' },
        competitive: { yes: true,  line: '&#8220;Two people sit down. One walks away happy.&#8221;' },
        skill:       { yes: true,  line: '&#8220;Grandmasters train for decades. What do you think?&#8221;' },
        fun:         { yes: true,  line: '&#8220;Depends who you ask. But yeah. For somebody.&#8221;' },
        players:     { yes: true,  line: '&#8220;Takes two. Always takes two.&#8221;' },
        end:         { yes: true,  line: '&#8220;Checkmate, stalemate, or resignation. It always ends.&#8221;' }
      }
    },
    {
      id: 'checkers', name: 'CHECKERS',
      description: 'Red and black discs. Same essential shape as the one before. The profile was holding.',
      introMonologue: 'Second suspect. Same tailor as the first, different suit. I felt good. Two confirmations in a row and I\'d be halfway to a case.',
      answers: {
        rules:       { yes: true,  line: '&#8220;Move diagonally. Jump to capture. King me when I reach the end.&#8221;' },
        winner:      { yes: true,  line: '&#8220;Whoever still has pieces left.&#8221;' },
        competitive: { yes: true,  line: '&#8220;Head to head. Always.&#8221;' },
        skill:       { yes: true,  line: '&#8220;Some skill. Some luck. Mostly skill.&#8221;' },
        fun:         { yes: true,  line: '&#8220;Fun enough for a rainy afternoon.&#8221;' },
        players:     { yes: true,  line: '&#8220;Two. Just two.&#8221;' },
        end:         { yes: true,  line: '&#8220;When one of us has nothing left to move.&#8221;' }
      }
    },
    {
      id: 'solitaire', name: 'SOLITAIRE',
      description: 'Came in alone. Said it played by itself. I should have seen trouble coming.',
      introMonologue: 'Pack of cards on the table, nobody across from it. I asked who the opponent was. It just looked at me.',
      answers: {
        rules:       { yes: true,  line: '&#8220;Rules? Sure. Red on black, king to an empty column.&#8221;' },

// ─── State ─────────────────────────────────────────────────────────────────

var state = {
  screen: 'title',              // title | opening | caseSelect | interrogation | wittInterlude | debrief
  caseId: null,                 // 'game' | 'art' | 'number' | 'tool'
  suspectIndex: 0,              // 0-7
  questionsAsked: {},           // suspectId -> Set of featureIds (tracked as plain obj)
  essenceProfile: {},           // featureId -> {state, firstSuspect, contradictedBy}
  testimony: null,              // current testimony object {featureId, yes, line, contradiction}
  confidence: 100,
  contradictionCount: 0,
  pendingInterludeIndex: -1,    // index into WITT_LINES queue
  wittTriggered: [],            // thresholds already fired
  interrogationHistory: []      // list of {suspectId, featureId, yes, contradicted}
};

var content = document.getElementById('content');

document.addEventListener('error', function(e) {
  if (e.target.tagName === 'IMG') e.target.style.display = 'none';
}, true);

// ─── Utility ───────────────────────────────────────────────────────────────

function div(cls, html) {
  var el = document.createElement('div');
  if (cls) el.className = cls;
  el.innerHTML = html;
  return el;
}

function scrollTop() { window.scrollTo({ top: 0, behavior: 'auto' }); }

function currentCase() { return CASES[state.caseId]; }
function currentSuspect() {
  var c = currentCase();
  return c.suspects[state.suspectIndex];
}
function featureById(fid) {
  var c = currentCase();
  for (var i = 0; i < c.features.length; i++) if (c.features[i].id === fid) return c.features[i];
  return null;
}
function interrogatedCount() {
  var seen = {};
  state.interrogationHistory.forEach(function(h) { seen[h.suspectId] = true; });
  return Object.keys(seen).length;
}
function suspectsAskedAnyQuestion() {
  return interrogatedCount();
}

function canCloseCase() {
  // after 2nd contradiction OR after all 8 suspects interrogated
  return state.contradictionCount >= 2 || interrogatedCount() >= 8;
}

function endingForSuspectCount(n) {
  for (var i = 0; i < ENDINGS.length; i++) {
    var e = ENDINGS[i];
    if (n >= e.min && n <= e.max) return e;
  }
  // fallback for n=1 (shouldn't happen since close-case gated)
  return ENDINGS[0];
}

      <p class="epigraph">&#8220;Don\'t say: <em>there must be something common, or they would not all be called by the same name</em> &#8212; but look and see whether there is anything common to all.&#8221;</p>\
      <p class="epigraph-attr">&#8212; Wittgenstein, <em>Philosophical Investigations</em> §66, 1953</p>\
      <button class="btn" id="begin-btn">Open the Case</button>\

  el.querySelector('#begin-btn').addEventListener('click', function() {

// ─── Render: Interrogation ─────────────────────────────────────────────────

function renderInterrogation() {
  scrollTop();
  content.innerHTML = '';
  var c = currentCase();
  var s = currentSuspect();

  // Initialize per-suspect question tracking
  if (!state.questionsAsked[s.id]) state.questionsAsked[s.id] = {};
  var asked = state.questionsAsked[s.id];
  var askedCount = Object.keys(asked).length;
  var maxQuestions = 3;

  // Build dossier panel
  var knownFeaturesHtml = '';
  var knownKeys = Object.keys(asked);
  if (knownKeys.length === 0) {
    knownFeaturesHtml = '<div class="dossier-feature-empty">No features on record yet.</div>';
  } else {
    knownFeaturesHtml = knownKeys.map(function(fid) {
      var f = featureById(fid);
      var yes = asked[fid];
      return '<div class="dossier-feature ' + (yes ? 'yes' : 'no') + '">' + f.text + '</div>';
    }).join('');
  }

  var initial = s.name.charAt(0);

  var dossierHtml = '\
    <div class="panel">\
      <div class="panel-title">Dossier</div>\
      <div class="dossier-case">Case File: ' + c.name + '</div>\
      <div class="dossier-count">Suspect ' + (state.suspectIndex + 1) + ' of ' + c.suspects.length + '</div>\
      <div class="suspect-portrait">\
        <div class="suspect-portrait-initial">' + initial + '</div>\
      </div>\
      <div class="suspect-name">' + s.name + '</div>\
      <div class="suspect-desc">' + s.description + '</div>\
      <div class="dossier-features-label">Features on record</div>\
      ' + knownFeaturesHtml + '\
    </div>';

  // Build interrogation center panel
  var testimonyHtml;
  if (state.testimony) {
    var t = state.testimony;
    var f = featureById(t.featureId);
    testimonyHtml = '\
      <div class="testimony-area">\
        <div class="testimony-head">On the record</div>\
        <div class="testimony-answer ' + (t.yes ? 'yes' : 'no') + '">' + (t.yes ? 'Yes' : 'No') + '</div>\
        <div class="testimony-line">' + t.line + '</div>\
      </div>';
  } else {
    testimonyHtml = '\
      <div class="testimony-area">\
        <div class="testimony-head">Waiting for testimony</div>\
        <div class="testimony-placeholder">Ask the suspect a question.</div>\
      </div>';
  }

  var questionsHtml = c.features.map(function(f) {
    var isAsked = asked.hasOwnProperty(f.id);
    var cls = 'question-btn' + (isAsked ? ' asked' : '');
    var attrs = isAsked || askedCount >= maxQuestions ? 'disabled' : '';
    return '<button class="' + cls + '" data-feature="' + f.id + '" ' + attrs + '>' + f.text + '</button>';
  }).join('');

  var introMonologueHtml = askedCount === 0
    ? '<div class="monologue">' + s.introMonologue + '</div>'
    : '';

  var nextLabel = state.suspectIndex === c.suspects.length - 1
    ? 'No more suspects.'
    : 'Bring In Next Suspect &rarr;';

  var canAdvance = askedCount > 0;
  var canBringNext = canAdvance && state.suspectIndex < c.suspects.length - 1;

  var nextBtnHtml = canBringNext
    ? '<button class="btn" id="next-suspect-btn">' + nextLabel + '</button>'
    : (state.suspectIndex === c.suspects.length - 1 && askedCount > 0
        ? '<span style="font-size:11px;color:var(--dim);letter-spacing:1px;">All suspects interrogated.</span>'
        : '<span style="font-size:11px;color:var(--dim);letter-spacing:1px;">Ask at least one question first.</span>');

  var centerHtml = '\
    <div class="panel">\
      <div class="panel-title">Interrogation</div>\
      ' + introMonologueHtml + '\
      ' + testimonyHtml + '\
      <div class="questions-label">Ask a Question ( ' + askedCount + ' / ' + maxQuestions + ' )</div>\
      ' + questionsHtml + '\
      <div class="interrogation-actions">\
        <div class="question-counter">' + (maxQuestions - askedCount) + ' questions left for this suspect</div>\
        ' + nextBtnHtml + '\
      </div>\
    </div>';

  // Essence Profile panel
  var profileHtml = buildEssenceProfileHtml();
  var closeCaseHtml = canCloseCase()
    ? '<div class="close-case-wrap">\
         <button class="close-case-btn" id="close-case-btn">Close the Case &#8212; No Essence Found</button>\
       </div>'
    : '';

  var confidencePct = Math.max(0, state.confidence);
  var fillCls = confidencePct < 40 ? 'confidence-fill low' : 'confidence-fill';
  var profilePanelHtml = '\
    <div class="panel">\
      <div class="panel-title">Essence Profile</div>\
      <div class="confidence-wrap">\
        <div class="confidence-head"><span>Confidence</span><span class="confidence-value">' + confidencePct + '%</span></div>\
        <div class="confidence-bar"><div class="' + fillCls + '" style="width:' + confidencePct + '%"></div></div>\
      </div>\
      ' + profileHtml + '\
      ' + closeCaseHtml + '\
    </div>';

  var el = div('fade-in', '\
    <div class="interrogation-wrap">\
      ' + dossierHtml + '\
      ' + centerHtml + '\
      ' + profilePanelHtml + '\
    </div>\
  ');
  content.appendChild(el);

  // Wire up question buttons
  el.querySelectorAll('.question-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (btn.disabled) return;
      var fid = btn.dataset.feature;
      handleQuestion(fid);
    });
  });

  // Wire up next suspect
  var nextBtn = el.querySelector('#next-suspect-btn');
  if (nextBtn) nextBtn.addEventListener('click', function() {
    state.suspectIndex++;
    state.testimony = null;
    render();
  });

  // Wire up close case
  var closeBtn = el.querySelector('#close-case-btn');
  if (closeBtn) closeBtn.addEventListener('click', function() {
    state.screen = 'debrief';
    render();
  });
}

function buildEssenceProfileHtml() {
  var c = currentCase();
  var entries = [];
  c.features.forEach(function(f) {
    var rec = state.essenceProfile[f.id];
    if (!rec) return;
    entries.push({ feature: f, rec: rec });
  });
  if (entries.length === 0) {
    return '<div class="essence-empty">No features yet. Ask a question.</div>';
  }
  return entries.map(function(e) {
    var f = e.feature, rec = e.rec;
    var yesPart = rec.firstAnswer ? f.text : 'Not: ' + f.text;
    var cls = rec.contradictedBy ? 'contradicted' : 'confirmed';
    var note = rec.contradictedBy
      ? '<span class="essence-feature-note">Contradicted by ' + rec.contradictedBy + '</span>'
      : '';
    return '<div class="essence-feature ' + cls + '">' + yesPart + note + '</div>';
  }).join('');
}

function handleQuestion(featureId) {
  var s = currentSuspect();
  var c = currentCase();
  var answer = s.answers[featureId];
  if (!answer) return;

  // Record in per-suspect tracking
  state.questionsAsked[s.id][featureId] = answer.yes;

  // Check essence profile: is this a confirmation, a first-entry, or a contradiction?
  var rec = state.essenceProfile[featureId];
  var contradiction = false;

  if (!rec) {
    // First time this feature is probed — add to profile
    state.essenceProfile[featureId] = {
      firstAnswer: answer.yes,
      firstSuspect: s.name,
      contradictedBy: null
    };
  } else if (rec.firstAnswer !== answer.yes && !rec.contradictedBy) {
    // New answer contradicts the first
    rec.contradictedBy = s.name;
    contradiction = true;
    state.contradictionCount++;
  }
  // else: same answer as before (confirmation) or already contradicted (no new strike)

  // Update confidence
  if (contradiction) {
    state.confidence = Math.max(0, state.confidence - 12);
  } else {
    state.confidence = Math.max(0, state.confidence - 3);
  }

  // Record testimony for display
  state.testimony = {
    featureId: featureId,
    yes: answer.yes,
    line: answer.line,
    contradiction: contradiction
  };

  // Record in history for export/web
  state.interrogationHistory.push({
    suspectId: s.id,
    suspectName: s.name,
    featureId: featureId,
    yes: answer.yes,
    contradicted: contradiction
  });

  // Check for Wittgenstein interlude trigger
  var trigger = null;
  for (var i = 0; i < WITT_LINES.length; i++) {
    var w = WITT_LINES[i];
    if (state.contradictionCount >= w.threshold && state.wittTriggered.indexOf(w.threshold) === -1) {
      trigger = i;
      state.wittTriggered.push(w.threshold);
      break;
    }
  }

  if (trigger !== null) {
    state.pendingInterludeIndex = trigger;
    state.screen = 'wittInterlude';
    render();
  } else {
    render();
  }
}

// ─── Render: Wittgenstein interlude ────────────────────────────────────────

function renderWittInterlude() {
  scrollTop();
  content.innerHTML = '';
  var w = WITT_LINES[state.pendingInterludeIndex];
  var linesHtml = w.lines.map(function(l) { return '<p class="witt-line">' + l + '</p>'; }).join('');
  var el = div('fade-in', '\
    <div style="padding-top: 40px;">\
      <div class="witt-overlay">\
        <div class="witt-speaker">A voice at the door</div>\
        ' + linesHtml + '\
        <p class="witt-source">&#8212; ' + w.source + '</p>\
      </div>\
      <div style="text-align:center; margin-top: 28px;">\
        <button class="btn" id="continue-btn">Back to the Interrogation</button>\
      </div>\
    </div>\
  ');
  content.appendChild(el);
  el.querySelector('#continue-btn').addEventListener('click', function() {
    state.screen = 'interrogation';
    state.pendingInterludeIndex = -1;
    render();
  });
}
// ─── Resemblance Web ───────────────────────────────────────────────────────
// Build from interrogation history: each interrogated suspect is a node.
// Edges drawn between pairs that gave the same answer to a shared feature.

function buildResemblanceWebSvg() {
  // Gather suspects actually interrogated (distinct)
  var suspectMap = {};
  state.interrogationHistory.forEach(function(h) {
    if (!suspectMap[h.suspectId]) {
      suspectMap[h.suspectId] = { id: h.suspectId, name: h.suspectName, answers: {} };
    }
    suspectMap[h.suspectId].answers[h.featureId] = h.yes;
  });
  var suspects = Object.keys(suspectMap).map(function(k) { return suspectMap[k]; });
  var n = suspects.length;
  if (n === 0) return '<div class="essence-empty">No suspects interrogated.</div>';

  // Layout in a circle
  var W = 680, H = 420;
  var cx = W / 2, cy = H / 2;
  var r = Math.min(W, H) / 2 - 70;
  var positions = suspects.map(function(s, i) {
    var angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  });

  // Compute edges: for every pair of suspects, count shared features (same answer)
  var edges = [];
  for (var i = 0; i < n; i++) {
    for (var j = i + 1; j < n; j++) {
      var a = suspects[i].answers, b = suspects[j].answers;
      var shared = 0;
      Object.keys(a).forEach(function(fid) {
        if (b.hasOwnProperty(fid) && a[fid] === b[fid]) shared++;
      });
      if (shared > 0) edges.push({ from: i, to: j, shared: shared });
    }
  }

  var svg = '<svg class="web-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';

  // Draw edges first
  edges.forEach(function(e) {
    var p1 = positions[e.from], p2 = positions[e.to];
    var opacity = Math.min(1, 0.15 + 0.25 * e.shared);
    var thickness = 0.8 + 0.6 * e.shared;
    svg += '<line x1="' + p1.x + '" y1="' + p1.y + '" x2="' + p2.x + '" y2="' + p2.y + '" stroke="#6b4820" stroke-width="' + thickness + '" opacity="' + opacity + '" />';
  });

  // Draw nodes on top
  positions.forEach(function(p, i) {
    var s = suspects[i];
    svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="6" fill="#3d2005" />';
    // Place label outside the circle
    var angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    var lx = cx + (r + 30) * Math.cos(angle);
    var ly = cy + (r + 30) * Math.sin(angle);
    var anchor = Math.abs(Math.cos(angle)) < 0.3 ? 'middle' : (Math.cos(angle) > 0 ? 'start' : 'end');
    // Shorten long names
    var label = s.name.length > 18 ? s.name.substring(0, 16) + '...' : s.name;
    svg += '<text x="' + lx + '" y="' + ly + '" text-anchor="' + anchor + '" alignment-baseline="middle" font-family="Courier New, monospace" font-size="11" fill="#1a0a00" font-weight="bold">' + label + '</text>';
  });

  svg += '</svg>';
  return svg;
}

// ─── Export: Spade's Final Report ──────────────────────────────────────────

function buildReportText() {
  var c = currentCase();
  var lines = [];
  lines.push('SPADE\'S FINAL REPORT');
  lines.push('Case: THE MALTESE ESSENCE — ' + c.name);
  lines.push('Timestamp: ' + new Date().toLocaleString());
  lines.push('');
  lines.push('Suspects interrogated: ' + interrogatedCount() + ' of ' + c.suspects.length);
  lines.push('Final confidence: ' + state.confidence + '%');
  lines.push('Contradictions recorded: ' + state.contradictionCount);
  lines.push('');
  lines.push('ESSENCE PROFILE');
  lines.push('---------------');
  c.features.forEach(function(f) {
    var rec = state.essenceProfile[f.id];
    if (!rec) {
      lines.push('  [ ] ' + f.text + '   (not probed)');
      return;
    }
    var str = (rec.firstAnswer ? f.text : 'Not: ' + f.text);
    if (rec.contradictedBy) {
      lines.push('  [X] ' + str + '   — CONTRADICTED by ' + rec.contradictedBy);
    } else {
      lines.push('  [.] ' + str + '   — confirmed by ' + rec.firstSuspect);
    }
  });
  lines.push('');
  lines.push('INTERROGATION LOG');
  lines.push('-----------------');
  state.interrogationHistory.forEach(function(h) {
    var f = featureById(h.featureId);
    lines.push('  ' + h.suspectName + ' — "' + f.text + '" — ' + (h.yes ? 'YES' : 'NO') + (h.contradicted ? '   (contradiction)' : ''));
  });
  lines.push('');
  lines.push('RESEMBLANCE WEB (text form)');
  lines.push('---------------------------');
  var suspectMap = {};
  state.interrogationHistory.forEach(function(h) {
    if (!suspectMap[h.suspectId]) suspectMap[h.suspectId] = { name: h.suspectName, answers: {} };
    suspectMap[h.suspectId].answers[h.featureId] = h.yes;
  });
  var ids = Object.keys(suspectMap);
  for (var i = 0; i < ids.length; i++) {
    for (var j = i + 1; j < ids.length; j++) {
      var A = suspectMap[ids[i]], B = suspectMap[ids[j]];
      var shared = [];
      Object.keys(A.answers).forEach(function(fid) {
        if (B.answers.hasOwnProperty(fid) && A.answers[fid] === B.answers[fid]) {
          var f = featureById(fid);
          shared.push((A.answers[fid] ? '' : 'not-') + fid);
        }
      });
      if (shared.length > 0) {
        lines.push('  ' + A.name + ' <--> ' + B.name + '  (shared: ' + shared.join(', ') + ')');
      }
    }
  }
  lines.push('');
  lines.push('—');
  lines.push('The stuff cases are made of.');
  return lines.join('\n');
}

function copyReport() {
  var text = buildReportText();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var fb = document.getElementById('copy-feedback');
      if (fb) {
        fb.style.display = 'inline';
        setTimeout(function() { fb.style.display = 'none'; }, 2200);
      }
    });
  }
}

// ─── Render: Debrief ───────────────────────────────────────────────────────

function renderDebrief() {
  scrollTop();
  content.innerHTML = '';
  var count = interrogatedCount();
  var ending = endingForSuspectCount(count);
  var spadeHtml = ending.spade.map(function(p) { return '<p>' + p + '</p>'; }).join('');
  var wittFinalHtml = WITT_FINAL.lines.map(function(l) { return '<p class="witt-line">' + l + '</p>'; }).join('');
  var webSvg = buildResemblanceWebSvg();
  var report = buildReportText();

  var el = div('fade-in', '\
    <div id="debrief-screen">\
      <div class="debrief-title">The Recognition</div>\
      <div class="debrief-sub">' + ending.label + ' &#8212; ' + count + ' suspects interrogated</div>\
      \
      <div class="debrief-monologue">\
        ' + spadeHtml + '\
      </div>\
      \
      <div class="witt-overlay">\
        <div class="witt-speaker">Wittgenstein, one last time</div>\
        ' + wittFinalHtml + '\
        <p class="witt-source">&#8212; ' + WITT_FINAL.source + '</p>\
      </div>\
      \
      <p style="text-align:center;font-size:13px;color:var(--dim);font-style:italic;margin:28px 0;">' + ending.wittNote + '</p>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">The Resemblance Web</div>\
        ' + webSvg + '\
        <div class="web-legend">Each suspect connected to others by the features they actually shared. No central node. The mess is the picture.</div>\
      </div>\
      \
      <div class="debrief-section">\
        <div class="debrief-label">Spade\'s Final Report</div>\
        <div class="report-area" id="report-area">' + report + '</div>\
        <div style="text-align:center;">\
          <button class="btn" id="copy-btn">Copy Report to Clipboard</button>\
          <span class="copy-feedback" id="copy-feedback" style="display:none;">Copied.</span>\
        </div>\
      </div>\
      \
      <p style="text-align:center;font-size:14px;font-style:italic;color:var(--bright);margin:36px 0 8px;">&#8220;The stuff cases are made of.&#8221;</p>\
      <p style="text-align:center;font-size:12px;color:var(--dim);letter-spacing:2px;">&#8212; SAM SPADE</p>\
      \
      <div class="debrief-close">\
        <button class="btn" id="home-btn">Return to Philosophy Games</button>\
        <button class="btn btn-secondary" id="new-case-btn">Take Another Case</button>\
      </div>\
    </div>\
  ');
  content.appendChild(el);

  el.querySelector('#copy-btn').addEventListener('click', copyReport);
  el.querySelector('#home-btn').addEventListener('click', function() {
    window.location.href = '../index.html';
  });
  el.querySelector('#new-case-btn').addEventListener('click', function() {
    state.screen = 'caseSelect';
    state.caseId = null;
    state.suspectIndex = 0;
    state.questionsAsked = {};
    state.essenceProfile = {};
    state.testimony = null;
    state.confidence = 100;
    state.contradictionCount = 0;
    state.wittTriggered = [];
    state.interrogationHistory = [];
    render();
  });
}
// ─── Router ────────────────────────────────────────────────────────────────

function render() {
  if      (state.screen === 'title')          renderTitle();
  else if (state.screen === 'opening')        renderOpening();
  else if (state.screen === 'caseSelect')     renderCaseSelect();
  else if (state.screen === 'interrogation')  renderInterrogation();
  else if (state.screen === 'wittInterlude')  renderWittInterlude();
  else if (state.screen === 'debrief')        renderDebrief();
}

render();
</script>
